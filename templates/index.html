<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TPOPS 部署平台</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus@2.4.4/dist/index.css" />
  <style>
    :root {
      --ob-sidebar: #061a2e;
      --ob-sidebar-mid: #0b2744;
      --ob-sidebar-active: #1890ff;
      --ob-header-h: 52px;
      --ob-bg: #e8ecf1;
      /* 内容区：横向占满主区域（不再收窄到 1480） */
      --ob-content-max: 100%;
      --ob-main-pad-x: clamp(10px, 1.6vw, 20px);
      --ob-main-pad-y: clamp(8px, 1.2vw, 16px);
      --ob-card-radius: 10px;
      /* 工作台：左侧流水线列宽 */
      --deploy-pipeline-col: minmax(280px, 38%);
      /* 监控页右侧日志：封顶高度，内部滚动（左侧 manifest/流水线随页面增高） */
      --deploy-log-appctl-max-h: min(36vh, 420px);
      --deploy-log-file-max-h: min(28vh, 300px);
    }
    * { box-sizing: border-box; }
    html, body, #app { height: 100%; margin: 0; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
      background: var(--ob-bg);
      color: #303133;
    }
    .login-wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0b1f3a 0%, #1a3a5c 45%, #243b55 100%);
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 12px 48px rgba(0,0,0,.25);
    }
    .login-card .banner {
      background: linear-gradient(90deg, #132f4c, #1890ff);
      color: #fff;
      padding: 28px 32px;
    }
    .login-card .banner h1 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: .5px; }
    .login-card .banner p { margin: 8px 0 0; opacity: .9; font-size: 13px; }
    .login-card .body { padding: 28px 32px 32px; background: #fff; }
    .layout-root { height: 100%; }
    /* 右侧主列占满剩余高度，便于监控页双列撑满视口 */
    .layout-root > .el-container {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .ob-aside {
      background: linear-gradient(180deg, var(--ob-sidebar-mid) 0%, var(--ob-sidebar) 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,.08);
      transition: width 0.22s ease;
    }
    .ob-aside--collapsed .ob-logo-text { display: none; }
    .ob-aside--collapsed .ob-logo { justify-content: center; padding: 0 8px; }
    .ob-logo {
      height: var(--ob-header-h);
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-weight: 600;
      font-size: 15px;
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,.1);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ob-logo span { color: #69c0ff; margin-right: 8px; font-size: 18px; }
    .ob-aside-toggle {
      margin-top: auto; padding: 10px 12px;
      border-top: 1px solid rgba(255,255,255,.1);
    }
    .ob-aside-toggle .el-button { width: 100%; color: rgba(255,255,255,.85); border-color: rgba(255,255,255,.2); background: rgba(255,255,255,.06); }
    .ob-aside-toggle .el-button:hover { border-color: #69c0ff; color: #fff; background: rgba(24,144,255,.2); }
    .ob-menu { border-right: none !important; flex: 1; background: transparent !important; padding: 8px 0; }
    .ob-menu.el-menu--dark { --el-menu-bg-color: transparent; --el-menu-hover-bg-color: rgba(255,255,255,.1); }
    .ob-menu .el-menu-item { border-radius: 8px; margin: 4px 8px; height: 44px; line-height: 44px; }
    .ob-menu .el-menu-item.is-active {
      background: linear-gradient(90deg, rgba(24,144,255,.35), rgba(24,144,255,.12)) !important;
      border-left: 3px solid #69c0ff;
    }
    .ob-menu--collapse .el-menu-item.is-active { border-left: none; }
    .ob-header {
      height: var(--ob-header-h) !important;
      background: linear-gradient(180deg, #ffffff 0%, #fafbfd 100%);
      border-bottom: 1px solid #e4e7ed;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px 0 24px;
      box-shadow: 0 1px 2px rgba(0,21,41,.06);
    }
    .ob-breadcrumb { font-size: 13px; color: #606266; letter-spacing: .02em; }
    .ob-breadcrumb strong { color: #1d2129; font-weight: 600; }
    .ob-header-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    /* 主内容区滚动：用浏览器/主区域右侧滚动条，避免内层再套一层滚动框 */
    .ob-main {
      padding: var(--ob-main-pad-y) var(--ob-main-pad-x);
      background: var(--ob-bg);
      flex: 1;
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
    }
    .ob-main-inner {
      max-width: var(--ob-content-max);
      width: 100%;
      margin: 0 auto;
    }
    .ob-page-title { font-size: 17px; font-weight: 600; color: #1d2129; margin: 0 0 2px; letter-spacing: .02em; }
    .ob-page-sub { font-size: 13px; color: #86909c; margin: 0 0 10px; line-height: 1.45; }
    .stat-card { border-radius: var(--ob-card-radius); border: 1px solid #ebeef5; }
    .stat-card .num { font-size: clamp(20px, 4vw, 30px); font-weight: 600; color: #1890ff; line-height: 1.2; }
    .stat-card .lab { font-size: 13px; color: #909399; margin-top: 4px; }
    .log-box {
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: clamp(11px, 1.1vw, 13px);
      min-height: 120px;
      height: auto;
      overflow: auto;
      padding: 12px;
      border-radius: 4px;
      white-space: pre-wrap;
      border: 1px solid #303030;
    }
    /* 非监控页日志块限制高度；监控页主/副日志由 flex 分配 */
    .log-box:not(.log-deploy-main):not(.log-deploy-sub) {
      max-height: min(50vh, 480px);
      flex: 1 1 auto;
    }
    .status-none { color: #909399; }
    .status-running { color: #e6a23c; }
    .status-done { color: #67c23a; }
    .status-error { color: #f56c6c; }
    .status-null { color: #b37feb; }
    .status-retrying { color: #ff9800; }
    .hint { font-size: 12px; color: #909399; margin-top: 4px; line-height: 1.5; }
    .mono-ta textarea { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; }
    .deploy-action-rg { display: flex; flex-direction: column; align-items: stretch; gap: 10px; width: 100%; }
    .deploy-action-rg .el-radio-button { margin: 0 !important; }
    .deploy-action-rg .el-radio-button__inner { width: 100%; text-align: left; white-space: normal; height: auto; line-height: 1.45; padding: 12px 14px; }
    .flow-pipeline { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 8px 4px; padding: 16px 8px; background: #fafafa; border-radius: 8px; border: 1px solid #ebeef5; margin-bottom: 16px; }
    .flow-step { flex: 1; min-width: 72px; max-width: 140px; text-align: center; position: relative; }
    .flow-step:not(:last-child)::after { content: ''; position: absolute; top: 18px; right: -50%; width: 100%; height: 2px; background: #dcdfe6; z-index: 0; }
    .flow-step.done:not(:last-child)::after { background: #67c23a; }
    .flow-dot { width: 36px; height: 36px; border-radius: 50%; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; cursor: default; position: relative; z-index: 1; border: 2px solid #dcdfe6; background: #fff; color: #909399; transition: .2s; }
    .flow-dot.clickable { cursor: pointer; box-shadow: 0 0 0 2px rgba(24,144,255,.2); }
    .flow-dot.clickable:hover { border-color: #1890ff; color: #1890ff; }
    .flow-dot.pending { background: #f5f7fa; }
    .flow-dot.active { border-color: #e6a23c; color: #e6a23c; animation: pulse-dot 1.2s ease-in-out infinite; }
    .flow-dot.done { border-color: #67c23a; background: #f0f9ff; color: #67c23a; }
    .flow-dot.skip { background: #f4f4f5; color: #c0c4cc; border-style: dashed; }
    @keyframes pulse-dot { 0%,100%{ box-shadow: 0 0 0 0 rgba(230,162,60,.35);} 50%{ box-shadow: 0 0 0 6px rgba(230,162,60,0);} }
    .flow-cap { font-size: 12px; color: #606266; line-height: 1.35; }
    .flow-sub { font-size: 11px; color: #909399; margin-top: 4px; }
    .deploy-split { margin-top: 10px; }
    .deploy-monitor-stack {
      display: flex;
      flex-direction: column;
    }
    .deploy-monitor-stack > .deploy-page-toolbar,
    .deploy-monitor-stack > .deploy-status-strip {
      flex-shrink: 0;
    }
    /* 单卡片工作台：流水线 + 输出同在一个面板，中间细分割（业界常见「详情 + 终端」布局） */
    .deploy-console-card.el-card {
      border-radius: var(--ob-card-radius);
      overflow: visible;
    }
    .deploy-console-card > .el-card__header {
      padding: 12px 16px;
      background: linear-gradient(180deg, #fafbfd 0%, #f5f7fa 100%);
      border-bottom: 1px solid #e4e7ed;
    }
    .deploy-console-card > .el-card__body {
      display: block;
      padding: 0 !important;
      overflow: visible;
    }
    .deploy-console-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px 16px;
    }
    .deploy-console-head .t { font-size: 15px; font-weight: 600; color: #1d2129; }
    .deploy-console-head .meta { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    .deploy-console-phase {
      margin: 0 16px 12px;
      border-radius: 8px;
    }
    .deploy-console-phase-lab { font-size: 12px; color: #909399; font-weight: 500; }
    .deploy-console-phase-val { flex: 1; min-width: 120px; font-size: 12px; color: #606266; }
    .deploy-console-body {
      display: grid;
      grid-template-columns: 1fr;
      align-items: start;
      overflow: visible;
    }
    @media (min-width: 960px) {
      .deploy-console-body {
        grid-template-columns: var(--deploy-pipeline-col) 1px 1fr;
      }
    }
    .deploy-console-gutter {
      display: none;
      background: #e4e7ed;
    }
    @media (min-width: 960px) {
      .deploy-console-gutter { display: block; }
    }
    .deploy-console-left {
      min-width: 0;
      padding: 12px 14px;
      background: #fafbfc;
      border-bottom: 1px solid #ebeef5;
      overflow: visible;
    }
    @media (min-width: 960px) {
      .deploy-console-left {
        border-bottom: none;
        border-right: none;
      }
    }
    .deploy-console-right {
      min-width: 0;
      padding: 12px 14px;
      background: #fff;
      overflow: visible;
    }
    .deploy-log-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .deploy-log-seg {
      display: flex;
      flex-direction: column;
    }
    .deploy-log-seg--sub {
      flex: 0 0 auto;
    }
    .deploy-log-seg-title {
      font-size: 12px;
      font-weight: 600;
      color: #606266;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .deploy-log-seg-title code { font-size: 11px; font-weight: 500; }
    /* 流水线步骤随内容增高，整页用 .ob-main 滚动 */
    .pipeline-scroll {
      overflow: visible;
      padding-right: 4px;
    }
    .pipeline-step { margin-bottom: 16px; padding: 12px 14px 12px 16px; background: #fafafa; border-radius: 8px; border: 1px solid #ebeef5; border-left: 4px solid #dcdfe6; transition: background .2s, border-color .2s, box-shadow .2s; }
    .pipeline-step.sel { border-left-color: #1890ff; background: linear-gradient(90deg, #e6f4ff 0%, #f0f7ff 55%, #fafafa 100%); box-shadow: 0 0 0 1px rgba(24,144,255,.25), 0 4px 12px rgba(24,144,255,.12); }
    .pipeline-head { cursor: pointer; font-size: 15px; font-weight: 600; color: #303133; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
    .pipeline-head:hover { color: #1890ff; }
    .parallel-badge { font-size: 11px; color: #909399; font-weight: 400; }
    .pipeline-sub { margin: 10px 0 0 4px; padding-left: 12px; border-left: 2px dashed #dcdfe6; }
    .pipeline-subline { font-size: 13px; color: #303133; padding: 6px 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; cursor: pointer; border-radius: 6px; }
    .pipeline-subline:hover { background: rgba(24,144,255,.08); color: #1890ff; }
    .pipeline-lv-pill {
      display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 4px; font-size: 12px; font-weight: 600;
      letter-spacing: 0.02em;
    }
    .pipeline-lv-pill.lv-done { background: #e7f6e9; color: #237804; border: 1px solid #95de64; }
    .pipeline-lv-pill.lv-running { background: #fff7e6; color: #ad6800; border: 1px solid #ffc069; }
    .pipeline-lv-pill.lv-retrying { background: #fff2e8; color: #ad4e00; border: 1px solid #ffbb96; }
    .pipeline-lv-pill.lv-none { background: #f0f0f0; color: #434343; border: 1px solid #bfbfbf; }
    .pipeline-lv-pill.lv-error { background: #fff1f0; color: #a8071a; border: 1px solid #ffa39e; }
    .pipeline-lv-pill.lv-null { background: #f9f0ff; color: #531dab; border: 1px solid #d3adf7; }
    .sub-st-pill { font-size: 12px; font-weight: 600; padding: 1px 8px; border-radius: 4px; }
    .sub-st-pill.st-done { background: #e7f6e9; color: #237804; border: 1px solid #95de64; }
    .sub-st-pill.st-running { background: #fff7e6; color: #ad6800; border: 1px solid #ffc069; }
    .sub-st-pill.st-retrying { background: #fff2e8; color: #ad4e00; border: 1px solid #ffbb96; }
    .sub-st-pill.st-none { background: #f0f0f0; color: #434343; border: 1px solid #bfbfbf; }
    .sub-st-pill.st-error { background: #fff1f0; color: #a8071a; border: 1px solid #ffa39e; }
    .sub-st-pill.st-null { background: #f9f0ff; color: #531dab; border: 1px solid #d3adf7; }
    .pipeline-node-block { margin: 10px 0 0 8px; padding: 8px 10px 8px 12px; background: #fff; border-radius: 8px; border: 1px solid #e8e8e8; }
    .pipeline-node-label { font-size: 13px; font-weight: 600; color: #1890ff; margin-bottom: 6px; font-family: ui-monospace, Menlo, Consolas, monospace; }
    .log-deploy-main,
    .log-deploy-sub {
      overflow: auto;
      flex-shrink: 0;
    }
    .log-deploy-main {
      min-height: 120px;
      max-height: var(--deploy-log-appctl-max-h);
    }
    .log-deploy-sub {
      min-height: 96px;
      max-height: var(--deploy-log-file-max-h);
    }
    .phase-strip { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 10px 12px; background: #f5f7fa; border-radius: 6px; margin-bottom: 14px; font-size: 13px; color: #606266; }
    /* 主机管理页 */
    .host-hero {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap;
      margin-bottom: 16px; padding: 18px 20px; border-radius: 10px;
      background: linear-gradient(120deg, #0b1f3a 0%, #153a5c 55%, #1a5080 100%);
      color: #fff; box-shadow: 0 8px 24px rgba(11,31,58,.18);
    }
    .host-hero h2 { margin: 0 0 6px; font-size: 18px; font-weight: 600; color: #fff; }
    .host-hero p { margin: 0; font-size: 13px; opacity: .88; line-height: 1.5; max-width: 560px; }
    .host-hero .el-button { border-color: rgba(255,255,255,.35); color: #fff; background: rgba(255,255,255,.08); }
    .host-hero .el-button:hover { border-color: #69c0ff; color: #e6f7ff; background: rgba(255,255,255,.14); }
    .host-stat-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    .host-stat-pill {
      flex: 1; min-width: 120px; padding: 12px 16px; border-radius: 8px; background: #fff;
      border: 1px solid #e4e7ed; box-shadow: 0 1px 4px rgba(0,21,41,.06);
    }
    .host-stat-pill .n { font-size: 22px; font-weight: 600; color: #1890ff; line-height: 1.2; }
    .host-stat-pill .l { font-size: 12px; color: #909399; margin-top: 4px; }
    .ob-card-elevated {
      border-radius: var(--ob-card-radius);
      border: 1px solid #e4e7ed;
      box-shadow: 0 2px 8px rgba(15, 37, 64, .06), 0 1px 2px rgba(15, 37, 64, .04);
    }
    .host-card-accent { border-radius: var(--ob-card-radius); overflow: hidden; border: 1px solid #e4e7ed; box-shadow: 0 2px 12px rgba(0,21,41,.06); }
    .host-card-accent > .el-card__header {
      background: linear-gradient(90deg, #f6f9fc 0%, #fff 100%);
      border-bottom: 1px solid #ebeef5; font-weight: 600;
    }
    .host-table .el-table__header th { background: #f5f7fa !important; color: #606266; font-weight: 600; }
    .host-table .mono { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; }
    .host-endpoint { font-weight: 500; color: #303133; }
    .host-sub { font-size: 12px; color: #909399; margin-top: 2px; }
    /* 部署任务列表 */
    .deploy-hero {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap;
      margin-bottom: 14px; padding: 16px 18px; border-radius: 10px;
      background: linear-gradient(118deg, #102a43 0%, #1c4d6e 50%, #1a6b8c 100%);
      color: #fff; box-shadow: 0 8px 22px rgba(16,42,67,.2);
    }
    .deploy-hero h2 { margin: 0 0 6px; font-size: 17px; font-weight: 600; color: #fff; }
    .deploy-hero p { margin: 0; font-size: 12px; opacity: .9; line-height: 1.55; max-width: 640px; }
    .deploy-hero .el-button { border-color: rgba(255,255,255,.35); color: #fff; background: rgba(255,255,255,.1); }
    .deploy-hero .el-button--primary { background: #1890ff; border-color: #1890ff; color: #fff; }
    .deploy-task-card { border-radius: var(--ob-card-radius); overflow: hidden; border: 1px solid #e4e7ed; box-shadow: 0 2px 12px rgba(0,21,41,.06); margin-bottom: 10px; }
    .deploy-task-card > .el-card__header { background: linear-gradient(90deg, #f0f7ff 0%, #fff 100%); font-weight: 600; border-bottom: 1px solid #ebeef5; }
    .deploy-table .el-table__header th { background: #f5f7fa !important; color: #606266; font-weight: 600; }
    .deploy-table .row-current-task { background: #e6f7ff !important; }
    .deploy-table .row-current-task:hover > td { background: #d6f0ff !important; }
    .deploy-status-strip { margin-bottom: 8px; }
    .deploy-status-strip .el-alert__title { font-size: 13px; line-height: 1.55; font-weight: 500; }
    .deploy-outcome-ok { color: #67c23a; font-weight: 600; }
    .deploy-outcome-bad { color: #f56c6c; font-weight: 600; }
    /* OceanBase 风格部署向导：左侧步骤 + 右侧内容 */
    .deploy-wizard-shell {
      border-radius: 12px; overflow: visible; border: 1px solid #e4e7ed;
      box-shadow: 0 4px 20px rgba(0,21,41,.08); background: #fff;
    }
    .deploy-wizard-shell .el-row { margin: 0 !important; }
    .deploy-wizard-nav {
      background: linear-gradient(180deg, #0d2844 0%, #0b1f3a 40%, #102a43 100%);
      color: #fff; padding: 16px 0 18px;
      min-height: 0;
    }
    .deploy-wizard-brand { padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,.1); margin-bottom: 8px; }
    .deploy-wizard-brand h3 { margin: 0 0 6px; font-size: 15px; font-weight: 600; color: #fff; }
    .deploy-wizard-brand p { margin: 0; font-size: 12px; color: rgba(255,255,255,.72); line-height: 1.5; }
    .deploy-step-item {
      display: flex; align-items: flex-start; gap: 12px; padding: 14px 20px; cursor: pointer;
      border-left: 3px solid transparent; transition: background .15s, border-color .15s;
    }
    .deploy-step-item:hover { background: rgba(255,255,255,.06); }
    .deploy-step-item.active { background: rgba(24,144,255,.15); border-left-color: #1890ff; }
    .deploy-step-item.done { opacity: .92; }
    .deploy-step-num {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; background: rgba(255,255,255,.12); color: #fff; border: 1px solid rgba(255,255,255,.2);
    }
    .deploy-step-item.active .deploy-step-num { background: #1890ff; border-color: #1890ff; }
    .deploy-step-item.done .deploy-step-num { background: #52c41a; border-color: #52c41a; color: #fff; }
    .deploy-step-text .t { font-size: 14px; font-weight: 600; color: #fff; }
    .deploy-step-text .d { font-size: 12px; color: rgba(255,255,255,.65); margin-top: 4px; line-height: 1.45; }
    .deploy-wizard-body { padding: clamp(14px, 2.5vw, 24px); background: #fafbfc; min-height: 0; }
    .deploy-wizard-body .panel-title { font-size: 15px; font-weight: 600; color: #303133; margin: 0 0 16px; }
    .deploy-wizard-footer {
      margin-top: 20px; padding-top: 16px; border-top: 1px solid #ebeef5;
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between;
    }
    /* Manifest 总进度仪表盘 */
    .manifest-dash {
      background: linear-gradient(135deg, #f6f9fc 0%, #fff 55%, #f0f7ff 100%);
      border: 1px solid #e4e7ed; border-radius: 10px; padding: 16px 18px; margin-bottom: 14px;
    }
    .manifest-dash-top { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .manifest-dash-pct { font-size: 28px; font-weight: 700; color: #1890ff; line-height: 1; }
    .manifest-dash-pct span { font-size: 14px; font-weight: 500; color: #909399; margin-left: 2px; }
    .manifest-dash-meta { display: flex; flex-wrap: wrap; gap: 20px; font-size: 13px; color: #606266; }
    .manifest-dash-meta strong { color: #303133; }
    .manifest-dash-bar { margin-top: 4px; }
    .manifest-current-box {
      margin-top: 12px; padding: 10px 12px; background: #fff; border-radius: 8px; border: 1px dashed #c6e2ff;
      font-size: 13px; color: #606266; line-height: 1.5;
    }
    .manifest-current-box .lab { font-size: 12px; color: #909399; margin-bottom: 4px; }
    .manifest-current-box .val { color: #303133; font-weight: 500; word-break: break-all; }
    /* 三节点：各节点并行进度条 */
    .triple-node-strip {
      display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 14px;
    }
    .triple-node-card {
      flex: 1; min-width: 160px; max-width: 100%;
      padding: 12px 14px; background: #fff; border: 1px solid #e4e7ed; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,21,41,.05);
    }
    .triple-node-card .head { font-size: 13px; font-weight: 600; color: #303133; margin-bottom: 6px; word-break: break-all; }
    .triple-node-card .role { font-size: 11px; color: #909399; margin-bottom: 8px; }
    .triple-node-card .el-progress { margin-top: 4px; }
    .node-status-dots { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-top: 6px; }
    .node-dot { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #f5f7fa; border: 1px solid #ebeef5; }
    .node-dot.done { background: #f0f9eb; border-color: #c2e7b0; color: #52c41a; }
    .node-dot.running { background: #fdf6ec; border-color: #f5dab1; color: #e6a23c; }
    .node-dot.error { background: #fef0f0; border-color: #fbc4c4; color: #f56c6c; }
    .node-dot.none { color: #909399; }
    .deploy-page-toolbar {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
      gap: 8px; margin-bottom: 8px;
    }
    .deploy-page-toolbar .left { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
    .deploy-page-toolbar h2.ob-page-title { margin: 0; }
    /* 注册弹窗：窄屏不溢出 */
    .el-dialog { max-width: calc(100vw - 24px) !important; }
    @media (max-width: 576px) {
      .ob-header { padding: 0 12px; flex-wrap: wrap; height: auto !important; min-height: var(--ob-header-h); padding-top: 8px; padding-bottom: 8px; }
      .ob-breadcrumb { width: 100%; margin-bottom: 4px; }
    }
    .host-form-card-narrow { max-width: min(720px, 100%); }
  </style>
</head>
<body>
  <div id="app">
    <!-- 登录（OceanBase 类控制台登录区） -->
    <div v-if="!token" class="login-wrap">
      <div class="login-card">
        <div class="banner">
          <h1>TPOPS 部署平台</h1>
          <p>集群部署 · 预检查 · 安装 · 卸载 · 进度与日志</p>
        </div>
        <div class="body">
          <el-form :model="loginForm" label-position="top" @keyup.enter="doLogin">
            <el-form-item label="用户名">
              <el-input v-model="loginForm.username" size="large" autocomplete="username" placeholder="请输入用户名" />
            </el-form-item>
            <el-form-item label="密码">
              <el-input v-model="loginForm.password" size="large" type="password" show-password autocomplete="current-password" placeholder="请输入密码" />
            </el-form-item>
            <el-form-item style="margin-bottom: 12px;">
              <el-button type="primary" size="large" style="width:100%" @click="doLogin" :loading="loading">登 录</el-button>
            </el-form-item>
            <div style="text-align:center;">
              <el-button link type="primary" @click="showRegister = true">注册账号</el-button>
            </div>
          </el-form>
        </div>
      </div>
    </div>

    <!-- 主布局：侧栏 + 顶栏 + 内容区（参考 OAT/OCP：可折叠导航 + 居中内容区） -->
    <el-container v-else class="layout-root">
      <el-aside :width="sidebarCollapsed ? '64px' : '220px'" :class="['ob-aside', { 'ob-aside--collapsed': sidebarCollapsed }]">
        <div class="ob-logo"><span>◆</span><span class="ob-logo-text"> TPOPS 部署</span></div>
        <el-menu
          class="ob-menu"
          :class="{ 'ob-menu--collapse': sidebarCollapsed }"
          :default-active="activeMenu"
          :collapse="sidebarCollapsed"
          :collapse-transition="false"
          background-color="transparent"
          text-color="rgba(255,255,255,.75)"
          active-text-color="#fff"
          @select="onMenuSelect"
        >
          <el-menu-item index="overview">
            <span>概览</span>
          </el-menu-item>
          <el-menu-item index="hosts">
            <span>主机管理</span>
          </el-menu-item>
          <el-menu-item index="deploy">
            <span>部署任务</span>
          </el-menu-item>
        </el-menu>
        <div class="ob-aside-toggle">
          <el-button size="small" @click="sidebarCollapsed = !sidebarCollapsed">{{ sidebarCollapsed ? '展开' : '收起' }}</el-button>
        </div>
      </el-aside>
      <el-container direction="vertical">
        <el-header class="ob-header">
          <div class="ob-breadcrumb">
            控制台 / <strong v-text="breadcrumbTitle"></strong>
          </div>
          <div class="ob-header-actions">
            <el-tag effect="plain" type="info" v-text="user.username || '-'"></el-tag>
            <el-button type="danger" link @click="logout">退出登录</el-button>
          </div>
        </el-header>
        <el-main ref="obMainEl" class="ob-main">
          <div class="ob-main-inner">
          <!-- 概览 -->
          <template v-if="activeMenu === 'overview'">
            <h2 class="ob-page-title">概览</h2>
            <p class="ob-page-sub">资源与任务总览；部署形态与 appctl 流程说明见下方卡片。</p>
            <el-row :gutter="16" style="margin-bottom:20px;">
              <el-col :xs="24" :sm="8" :md="4">
                <el-card shadow="hover" class="stat-card ob-card-elevated">
                  <div class="num" v-text="hosts.length"></div>
                  <div class="lab">已配置主机</div>
                </el-card>
              </el-col>
              <el-col :xs="24" :sm="8" :md="4">
                <el-card shadow="hover" class="stat-card ob-card-elevated">
                  <div class="num" v-text="tasks.length"></div>
                  <div class="lab">历史任务数</div>
                </el-card>
              </el-col>
              <el-col :xs="24" :sm="8" :md="4">
                <el-card shadow="hover" class="stat-card ob-card-elevated">
                  <div class="num" style="color:#e6a23c;" v-text="runningCount"></div>
                  <div class="lab">进行中</div>
                </el-card>
              </el-col>
              <el-col :xs="24" :sm="8" :md="4">
                <el-card shadow="hover" class="stat-card ob-card-elevated">
                  <div class="num" style="color:#52c41a;" v-text="successCount"></div>
                  <div class="lab">成功</div>
                </el-card>
              </el-col>
              <el-col :xs="24" :sm="8" :md="4">
                <el-card shadow="hover" class="stat-card ob-card-elevated">
                  <div class="num" style="color:#f56c6c;" v-text="failedCount"></div>
                  <div class="lab">失败</div>
                </el-card>
              </el-col>
              <el-col :xs="24" :sm="8" :md="4">
                <el-card shadow="hover" class="stat-card ob-card-elevated">
                  <div class="num" style="color:#909399;" v-text="(tasks.length ? Math.round(successCount * 100 / tasks.length) : 0) + '%'"></div>
                  <div class="lab">成功率</div>
                </el-card>
              </el-col>
            </el-row>
            <el-row :gutter="16" style="margin-bottom:20px;">
              <el-col :xs="24" :lg="14">
                <el-card shadow="never" class="ob-card-elevated">
                  <template #header><span style="font-weight:600">平台说明</span></template>
                  <p style="margin:0 0 10px;line-height:1.7;color:#606266;">
                    本控制台用于 <strong>TPOPS / GaussDB 容器化部署</strong>：在「主机管理」登记 SSH 可达的执行机（部署根目录需含 <code>appctl.sh</code>），在「部署任务」按向导填写
                    <code>user_edit_file.conf</code> 后，系统会<strong>自动检测</strong>远程
                    <code>config/gaussdb/user_edit_file.conf</code> 或 <code>config/user_edit_file.conf</code> 是否存在并<strong>覆盖写入</strong>，再执行所选 <code>appctl.sh</code> 操作。
                  </p>
                  <el-descriptions :column="1" border size="small">
                    <el-descriptions-item label="Manifest">安装/升级时在执行机 <code>config/gaussdb/</code> 下轮询：<strong>单节点</strong>仅 <code>manifest.yaml</code>；<strong>三节点</strong>为 <code>manifest.yaml</code> + <code>manifest_&lt;node2_ip&gt;.yaml</code> + <code>manifest_&lt;node3_ip&gt;.yaml</code>（IP 来自 user_edit），合并展示流水线</el-descriptions-item>
                    <el-descriptions-item label="配置文件"><code>user_edit</code> 以页面填写为准原样下发；所选节点仅用于 SSH 连接与执行 appctl</el-descriptions-item>
                    <el-descriptions-item label="注意">docker-service 不建议并发执行多个 appctl；同一主机请避免并行任务。</el-descriptions-item>
                  </el-descriptions>
                </el-card>
              </el-col>
              <el-col :xs="24" :lg="10">
                <el-card shadow="never" class="ob-card-elevated">
                  <template #header><span style="font-weight:600">快速开始</span></template>
                  <el-steps direction="vertical" :active="4" finish-status="success">
                    <el-step title="登记主机" description="SSH、部署根目录 /data/docker-service" />
                    <el-step title="选择部署形态" description="单节点或三节点形态" />
                    <el-step title="选择节点" description="节点 1 必填；三节点时 2/3 可选" />
                    <el-step title="配置与下发" description="编辑 user_edit 并选择 appctl 操作" />
                  </el-steps>
                </el-card>
              </el-col>
            </el-row>

            <el-row :gutter="16">
              <el-col :xs="24" :lg="14">
                <el-card shadow="never" class="ob-card-elevated">
                  <template #header><span style="font-weight:600">已纳管主机</span></template>
                  <el-table v-if="hosts.length" :data="hosts" stripe size="small" max-height="40vh" class="host-table">
                    <el-table-column prop="name" label="名称" width="120" show-overflow-tooltip />
                    <el-table-column label="连接" min-width="150">
                      <template #default="{ row }">
                        <span class="host-endpoint mono">{{ row.hostname }}:{{ row.port }}</span>
                        <div class="host-sub">{{ row.username }} · {{ authMethodLabel(row.auth_method) }}</div>
                      </template>
                    </el-table-column>
                    <el-table-column prop="docker_service_root" label="部署根目录" min-width="160" show-overflow-tooltip />
                    <el-table-column label="凭证" width="80" align="center">
                      <template #default="{ row }">
                        <el-tag :type="row.has_credential ? 'success' : 'warning'" size="small" effect="plain">{{ row.has_credential ? '已配' : '未配' }}</el-tag>
                      </template>
                    </el-table-column>
                  </el-table>
                  <el-empty v-else description="暂无主机，请前往「主机管理」点击纳管主机" />
                </el-card>
              </el-col>
              <el-col :xs="24" :lg="10">
                <el-card shadow="never" class="ob-card-elevated">
                  <template #header><span style="font-weight:600">最近任务</span></template>
                  <el-table v-if="lastTasks.length" :data="lastTasks" stripe size="small" max-height="40vh">
                    <el-table-column prop="id" label="ID" width="56" />
                    <el-table-column prop="host_name" label="节点1" min-width="90" show-overflow-tooltip />
                    <el-table-column prop="deploy_mode" label="形态" width="72" />
                    <el-table-column label="操作" min-width="100" show-overflow-tooltip>
                      <template #default="{ row }"><span v-text="deployActionLabel(row.action)"></span></template>
                    </el-table-column>
                    <el-table-column label="结果" width="88" align="center">
                      <template #default="{ row }">
                        <el-tag size="small" :type="deployOutcomeTagType(row.status)" effect="dark">{{ row.outcome_label || deployStatusLabel(row.status) }}</el-tag>
                      </template>
                    </el-table-column>
                  </el-table>
                  <el-empty v-else description="暂无任务记录" />
                </el-card>
              </el-col>
            </el-row>
          </template>

          <!-- 主机管理：列表 / 纳管表单 -->
          <template v-else-if="activeMenu === 'hosts'">
            <template v-if="hostSubView === 'list'">
            <h2 class="ob-page-title">主机管理</h2>
            <p class="ob-page-sub">纳管执行机与部署根目录，供部署任务 SSH 下发使用。</p>
            <div class="host-hero">
              <div>
                <h2>主机纳管</h2>
                <p>本页展示已纳管主机列表。点击<strong>纳管主机</strong>填写 SSH 与部署根目录；仅本人创建及未绑定属主的主机对本账号可见。</p>
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:8px;">
                <el-button :loading="loading" @click="refreshHostsPage">
                  <span style="margin-right:4px">↻</span> 刷新列表
                </el-button>
                <el-button type="success" @click="openHostEnroll">纳管主机</el-button>
              </div>
            </div>
            <div class="host-stat-row">
              <div class="host-stat-pill"><div class="n" v-text="hosts.length"></div><div class="l">已纳管主机</div></div>
              <div class="host-stat-pill"><div class="n" v-text="hostsWithCredential"></div><div class="l">已配置 SSH 凭证</div></div>
              <div class="host-stat-pill"><div class="n" v-text="hostsKeyAuth"></div><div class="l">密钥登录</div></div>
            </div>
            <el-card shadow="never" class="host-card-accent">
              <template #header>
                <span>主机列表</span>
                <span style="float:right;font-weight:400;font-size:12px;color:#909399">共 {{ hosts.length }} 台</span>
              </template>
                  <el-table
                    :data="hosts"
                    stripe
                    style="width:100%"
                    class="host-table"
                    empty-text="暂无主机，请点击「纳管主机」添加"
                    :default-sort="{ prop: 'created_at', order: 'descending' }"
                  >
                    <el-table-column prop="id" label="ID" width="64" sortable />
                    <el-table-column prop="name" label="显示名称" min-width="110" show-overflow-tooltip sortable />
                    <el-table-column label="SSH 连接" min-width="168">
                      <template #default="{ row }">
                        <span class="host-endpoint mono">{{ row.hostname }}:{{ row.port }}</span>
                        <div class="host-sub">用户 <strong>{{ row.username }}</strong></div>
                      </template>
                    </el-table-column>
                    <el-table-column label="认证" width="96" align="center">
                      <template #default="{ row }">
                        <el-tag size="small" :type="row.auth_method === 'key' ? 'primary' : 'info'" effect="light">{{ authMethodLabel(row.auth_method) }}</el-tag>
                      </template>
                    </el-table-column>
                    <el-table-column label="凭证" width="88" align="center">
                      <template #default="{ row }">
                        <el-tooltip :content="row.has_credential ? '已保存加密凭证，可测连通性' : '未保存密码/私钥，请先编辑填写'" placement="top">
                          <el-tag size="small" :type="row.has_credential ? 'success' : 'warning'" effect="plain">{{ row.has_credential ? '已保存' : '未配置' }}</el-tag>
                        </el-tooltip>
                      </template>
                    </el-table-column>
                    <el-table-column prop="docker_service_root" label="部署根目录" min-width="150" show-overflow-tooltip />
                    <el-table-column label="属主" width="100" show-overflow-tooltip>
                      <template #default="{ row }">
                        <span>{{ row.owner_username || '—' }}</span>
                      </template>
                    </el-table-column>
                    <el-table-column prop="created_at" label="创建时间" width="158" sortable>
                      <template #default="{ row }">
                        <span class="mono" style="font-size:12px;color:#606266">{{ formatHostTime(row.created_at) }}</span>
                      </template>
                    </el-table-column>
                    <el-table-column label="操作" width="220" fixed="right">
                      <template #default="{ row }">
                        <el-button link type="primary" @click="editHost(row)">编辑</el-button>
                        <el-button link type="success" @click="testHost(row)" :loading="row._testing">连通性</el-button>
                        <el-button link type="danger" @click="deleteHost(row)">删除</el-button>
                      </template>
                    </el-table-column>
                  </el-table>
            </el-card>
            </template>

            <template v-else-if="hostSubView === 'form'">
            <h2 class="ob-page-title">纳管主机</h2>
            <p class="ob-page-sub">填写 SSH 与远程 <code>appctl.sh</code> 所在目录；凭证加密存储。</p>
            <div class="deploy-page-toolbar">
              <div class="left">
                <el-button @click="backToHostList">← 返回主机列表</el-button>
                <h2 class="ob-page-title">{{ hostForm.id ? '编辑主机' : '纳管主机' }}</h2>
              </div>
            </div>
            <el-card shadow="never" class="host-card-accent host-form-card-narrow">
              <template #header><span>{{ hostForm.id ? '修改配置' : '新增主机' }}</span></template>
              <el-form :model="hostForm" label-width="112px" size="default">
                <el-form-item label="显示名称">
                  <el-input v-model="hostForm.name" placeholder="如：生产节点-1" />
                </el-form-item>
                <el-form-item label="IP / 域名">
                  <el-input v-model="hostForm.hostname" placeholder="SSH 地址" />
                </el-form-item>
                <el-form-item label="SSH 端口">
                  <el-input-number v-model="hostForm.port" :min="1" :max="65535" style="width:100%" />
                </el-form-item>
                <el-form-item label="SSH 用户">
                  <el-input v-model="hostForm.username" placeholder="如 root" />
                </el-form-item>
                <el-form-item label="认证方式">
                  <el-radio-group v-model="hostForm.auth_method">
                    <el-radio label="password">密码</el-radio>
                    <el-radio label="key">私钥</el-radio>
                  </el-radio-group>
                </el-form-item>
                <el-form-item v-if="hostForm.auth_method==='password'" label="密码">
                  <el-input v-model="hostForm.password" type="password" show-password placeholder="保存时写入" />
                </el-form-item>
                <el-form-item v-else label="私钥 PEM">
                  <el-input v-model="hostForm.private_key" type="textarea" :rows="5" placeholder="-----BEGIN ... KEY-----" />
                </el-form-item>
                <el-form-item label="部署根目录">
                  <el-input v-model="hostForm.docker_service_root" placeholder="/data/docker-service" />
                  <div class="hint">与远程 <code>appctl.sh</code> 所在目录一致（如 <code>/data/docker-service</code>）。执行：<code>cd &lt;目录&gt; && sh appctl.sh ...</code>。进度文件：<code>&lt;目录&gt;/config/gaussdb/manifest.yaml</code>。</div>
                </el-form-item>
                <el-form-item>
                  <el-button type="primary" @click="saveHost" :loading="loading">保存</el-button>
                  <el-button v-if="hostForm.id" @click="backToHostList">取消并返回列表</el-button>
                  <el-button v-else @click="resetHostForm">清空表单</el-button>
                </el-form-item>
              </el-form>
            </el-card>
            </template>
          </template>

          <!-- 部署任务：列表 / 新建向导 / 执行监控 分屏 -->
          <template v-else-if="activeMenu === 'deploy'">
            <!-- ① 部署记录列表（与新建入口同页） -->
            <template v-if="deploySubView === 'list'">
            <h2 class="ob-page-title">部署任务</h2>
            <p class="ob-page-sub">查看历史记录与结果；新建部署进入引导，查看详情进入实时监控（返回列表不断连）。</p>
            <div class="deploy-hero">
              <div>
                <h2 style="margin:0 0 6px;font-size:17px;font-weight:600;color:#fff;">任务列表</h2>
                <p>本页为<strong>部署记录</strong>。点击<strong>新建部署</strong>进入引导页；下发或查看详情进入<strong>流水线与日志</strong>页。从监控页返回列表时<strong>不会断开实时连接</strong>，再次进入监控页可继续看到同一任务的输出。</p>
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:8px;">

          if (x === 'running') return 'st-running';
          if (x === 'retrying') return 'st-retrying';

        const formatDurationSec = (sec) => {

          const s = Math.floor(sec);
          const h = Math.floor(s / 3600);
          const m = Math.floor((s % 3600) / 60);
          const r = s % 60;
          if (h > 0) return h + ' 小时 ' + m + ' 分 ' + r + ' 秒';
          if (m > 0) return m + ' 分 ' + r + ' 秒';
          return r + ' 秒';
        };

          if (p != null) return Math.min(100, Math.max(0, Math.round(p)));
          const t = s.services_total || 0;
          const d = s.services_done || 0;

            parts.push('退出码 ' + s.exit_code);

          else if (s && s.started_at && st === 'running') parts.push('开始 ' + formatHostTime(s.started_at));

          }

          const parseIso = (x) => {

          const start = taskRunStartedMs.value;
          if (start == null) return '—';
          const end = taskRunEndedMs.value != null ? taskRunEndedMs.value : deployNowMs.value;

        const refreshCurrentTaskSnapshot = async () => {

          manifestPayload.value = null;
          manifestSummary.value = null;

        const openLogTail = (kind) => {

          logTailText.value = '';
          logTailLabel.value = kind === 'install' ? 'install.log' : 'precheck.log';
          const proto = location.protocol === 'https:' ? 'wss' : 'ws';
          const url = `${proto}://${location.host}/ws/deploy/${currentTaskId.value}/log/?token=${encodeURIComponent(token.value)}&kind=${encodeURIComponent(kind)}`;
          logSocket = new WebSocket(url);
          logSocket.onmessage = (ev) => {
            let msg;
            try { msg = JSON.parse(ev.data); } catch { return; }
            if (msg.type === 'chunk' && msg.data) {
              logTailText.value += msg.data;
              scrollLogEl(logFileEl);

            if (msg.type === 'meta') logTailLabel.value = (msg.path || '') + ' (' + (msg.kind || '') + ')';

          if (!currentTaskId.value) return ElementPlus.ElMessage.warning('请先创建或订阅任务');
          closeLogSocket();
          logTailText.value = '';
          logTailLabel.value = hint || relFile;
          const proto = location.protocol === 'https:' ? 'wss' : 'ws';
          const url = `${proto}://${location.host}/ws/deploy/${currentTaskId.value}/log/?token=${encodeURIComponent(token.value)}&rel=${encodeURIComponent(relFile)}`;
          logSocket = new WebSocket(url);
          logSocket.onmessage = (ev) => {
            let msg;
            try { msg = JSON.parse(ev.data); } catch { return; }
            if (msg.type === 'chunk' && msg.data) {
              logTailText.value += msg.data;
              scrollLogEl(logFileEl);
            }
            if (msg.type === 'meta') logTailLabel.value = (msg.path || '') + (hint ? ' · ' + hint : '');
            if (msg.type === 'error') ElementPlus.ElMessage.error(msg.message || '日志错误');
          };
          logSocket.onerror = () => ElementPlus.ElMessage.error('日志 WebSocket 错误');
        };

        const logKindForTask = () => {
          const a = lastAction.value || '';
          if (a.startsWith('precheck')) return 'precheck';
          if (a === 'uninstall_all') return 'uninstall';
          return 'install';
        };

        const onPipelineStepClick = (row) => {
          selectedPipelineKey.value = row.key || '';
          selectedLogHint.value = row.title || '';
          openLogTail(logKindForTask());
        };

        const onPipelineSubClick = (sub, row) => {
          selectedPipelineKey.value = row.key || '';
          const lab = tripleDeployForManifest.value ? subLabelWithoutStatus(sub) : (sub.label || '');
          selectedLogHint.value = (row.title || '') + ' → ' + lab;
          openLogTail(logKindForTask());
        };

        const openSocket = (taskId) => {
          closeSocket();
          closeLogSocket();
          resetFlow();
          logTailText.value = '';
          const proto = location.protocol === 'https:' ? 'wss' : 'ws';
          const url = `${proto}://${location.host}/ws/deploy/${taskId}/?token=${encodeURIComponent(token.value)}`;
          socket = new WebSocket(url);
          socket.onmessage = (ev) => {
            let msg;
            try { msg = JSON.parse(ev.data); } catch { return; }
            if (msg.type === 'hello') {
              taskStatus.value = msg.status;
              if (msg.action) lastAction.value = msg.action;
              applyLiveTaskPatch({
                id: msg.task_id,
                action: msg.action,
                status: msg.status,
                exit_code: msg.exit_code,
                error_message: msg.error_message,
                finished_at: msg.finished_at,
                started_at: msg.started_at,
              });
              const st = msg.status || '';
              if (st === 'running' || st === 'pending') {
                const t = msg.started_at ? Date.parse(msg.started_at) : NaN;
                taskRunStartedMs.value = Number.isNaN(t) ? Date.now() : t;
                taskRunEndedMs.value = null;
                startDeployElapsedTimer();
              } else {
                clearDeployElapsedTimer();
                const a = msg.started_at ? Date.parse(msg.started_at) : null;
                const b = msg.finished_at ? Date.parse(msg.finished_at) : null;
                taskRunStartedMs.value = a && !Number.isNaN(a) ? a : null;
                taskRunEndedMs.value = b && !Number.isNaN(b) ? b : Date.now();
              }
            }
            if (msg.type === 'phase') {
              phaseBanner.value = msg.message || '';
              if (msg.paths && msg.paths.length) {
                phaseHint.value = '轮询: ' + msg.paths.join(', ');
              } else if (msg.paths_tried && msg.paths_tried.length) {
                phaseHint.value = '检测: ' + msg.paths_tried.join(', ');
              } else {
                phaseHint.value = msg.command || '';
              }
              if (msg.phase === 'run_appctl') { flowS1.value = 'active'; }
              if (msg.phase === 'manifest_polling') {
                flowS1.value = 'active';
                flowS3.value = 'active';
                flowS4.value = 'pending';
              }
              if (msg.phase === 'wait_init_in_stdout') {
                /* 兼容旧后端；新逻辑为 manifest_polling */
                flowS1.value = 'active';
                flowS3.value = 'active';
                flowS4.value = 'pending';
              }
              if (msg.phase === 'init_manifest_ready') {
                flowS3.value = 'active';
                flowS4.value = 'active';
              }
              if (msg.phase === 'manifest_skipped') {
                flowS3.value = 'skip';
                flowS4.value = 'skip';
              }
              if (msg.phase === 'precheck_no_manifest') {
                flowS3.value = 'skip';
                flowS4.value = 'skip';
              }
            }
            if (msg.type === 'log' && msg.data) logText.value += msg.data;
            if (msg.type === 'manifest' && msg.data) {
              manifestPayload.value = msg.data;
              if (msg.data.roots) treeRoots.value = msg.data.roots;
              manifestSummary.value = msg.data.summary || null;
              if (msg.data.manifest_paths) manifestPaths.value = msg.data.manifest_paths;
              flowS3.value = 'active';
              flowS4.value = 'active';
            }
            if (msg.type === 'manifest_wait') {
              let t = (msg.message || '') + (msg.paths ? ' — ' + msg.paths.join(', ') : '');
              if (msg.details && msg.details.length) t += ' | ' + msg.details.join(' | ');
              phaseHint.value = t;
            }
            if (msg.type === 'status') {
              taskStatus.value = msg.data;
              applyLiveTaskPatch({ status: msg.data });
              if (msg.data === 'running') {
                flowS1.value = 'active';
                if (taskRunStartedMs.value == null) {
                  taskRunStartedMs.value = Date.now();
                  startDeployElapsedTimer();
                }
              }
            }
            if (msg.type === 'done') {
              const st = msg.status || (msg.exit_code === 0 ? 'success' : 'failed');
              taskStatus.value = st;
              applyLiveTaskPatch({
                status: st,
                exit_code: msg.exit_code,
                finished_at: msg.finished_at,
              });
              taskRunEndedMs.value = msg.finished_at ? Date.parse(msg.finished_at) : Date.now();
              clearDeployElapsedTimer();
              flowS1.value = 'done';
              const a = lastAction.value || '';
              if (a === 'precheck_install' || a === 'precheck_upgrade' || a === 'uninstall_all') {
                flowS2.value = 'done';
                flowS3.value = 'skip';
                flowS4.value = 'skip';
              } else {
                flowS2.value = 'done';
                flowS3.value = flowS3.value === 'skip' ? 'skip' : 'done';
                flowS4.value = 'done';
              }
              refreshCurrentTaskSnapshot();
              fetchTasks().catch(() => {});
            }
          };
          socket.onerror = () => ElementPlus.ElMessage.error('WebSocket 错误');
        };

        const doLogin = async () => {
          loading.value = true;
          try {
            const { data } = await api.post('/auth/login/', loginForm);
            setAuth(data.token.access, data.token.refresh, data.user);
            ElementPlus.ElMessage.success('登录成功');
            activeMenu.value = 'overview';
            await fetchHosts();
            await fetchTasks();
          } catch (e) {
            ElementPlus.ElMessage.error(e.response?.data?.detail || '登录失败');
          } finally { loading.value = false; }
        };

        const doRegister = async () => {
          loading.value = true;
          try {
            await api.post('/auth/register/', regForm);
            ElementPlus.ElMessage.success('注册成功，请登录');
            showRegister.value = false;
          } catch (e) {
            ElementPlus.ElMessage.error('注册失败');
          } finally { loading.value = false; }
        };

        const logout = () => {
          closeSocket();
          closeLogSocket();
          clearDeployElapsedTimer();
          setAuth('', '', null);
          localStorage.removeItem('user');
          logText.value = '';
          logTailText.value = '';
          treeRoots.value = [];
          manifestSummary.value = null;
          manifestPaths.value = [];
          manifestPayload.value = null;
          selectedPipelineKey.value = '';
          selectedLogHint.value = '';
          currentTaskSnapshot.value = null;
          currentTaskId.value = null;
          taskStatus.value = '';
          taskRunStartedMs.value = null;
          taskRunEndedMs.value = null;
        };

        const resetHostForm = () => {
          Object.assign(hostForm, { id: null, name: '', hostname: '', port: 22, username: 'root', auth_method: 'password', password: '', private_key: '', docker_service_root: '/data/docker-service' });
        };

        const saveHost = async () => {
          loading.value = true;
          try {
            if (hostForm.id) {
              await api.patch('/hosts/' + hostForm.id + '/', hostForm);
            } else {
              await api.post('/hosts/', hostForm);
            }
            ElementPlus.ElMessage.success('已保存');
            resetHostForm();
            hostSubView.value = 'list';
            await fetchHosts();
          } catch (e) {
            ElementPlus.ElMessage.error('保存失败');
          } finally { loading.value = false; }
        };

        const editHost = (row) => {
          Object.assign(hostForm, { ...row, password: '', private_key: '' });
          hostSubView.value = 'form';
        };

        const testHost = async (row) => {
          row._testing = true;
          try {
            const { data } = await api.post('/hosts/' + row.id + '/test_connection/');
            if (data.ok) ElementPlus.ElMessage.success(data.message);
            else ElementPlus.ElMessage.error(data.message);
          } finally { row._testing = false; }
        };

        const deleteHost = async (row) => {
          try {
            await ElementPlus.ElMessageBox.confirm(
              '确定删除主机「' + (row.name || row.hostname) + '」？此操作不可恢复。',
              '删除确认',
              { type: 'warning', confirmButtonText: '删除', cancelButtonText: '取消' }
            );
          } catch { return; }
          loading.value = true;
          try {
            await api.delete('/hosts/' + row.id + '/');
            ElementPlus.ElMessage.success('已删除');
            if (hostForm.id === row.id) {
              resetHostForm();
              hostSubView.value = 'list';
            }
            await fetchHosts();
          } catch (e) {
            ElementPlus.ElMessage.error('删除失败');
          } finally { loading.value = false; }
        };

        const startDeploy = async () => {
          if (!deployForm.host) return ElementPlus.ElMessage.warning('请选择节点 1');
          if (!(deployForm.user_edit_content || '').trim())
            return ElementPlus.ElMessage.warning('请填写或保留默认 user_edit 配置');
          if (deployForm.deploy_mode === 'triple') {
            const ids = [deployForm.host, deployForm.host_node2, deployForm.host_node3].filter(Boolean);
            if (new Set(ids).size !== ids.length)
              return ElementPlus.ElMessage.warning('所选主机不能重复');
          }
          loading.value = true;
          logText.value = '';
          logTailText.value = '';
          treeRoots.value = [];
          manifestSummary.value = null;
          manifestPaths.value = [];
          manifestPayload.value = null;
          selectedPipelineKey.value = '';
          selectedLogHint.value = '';
          lastAction.value = deployForm.action;
          try {
            const body = {
              host: deployForm.host,
              deploy_mode: deployForm.deploy_mode,
              user_edit_content: deployForm.user_edit_content,
              action: deployForm.action,
              target: deployForm.target,
            };
            if (deployForm.deploy_mode === 'triple') {
              body.host_node2 = deployForm.host_node2;
              body.host_node3 = deployForm.host_node3;
            }
            const { data } = await api.post('/deployment/tasks/', body);
            currentTaskId.value = data.id;
            taskStatus.value = data.status;
            currentTaskSnapshot.value = data;
            deploySubView.value = 'monitor';
            openSocket(data.id);
            await fetchTasks();
            ElementPlus.ElMessage.success('任务已创建');
            deployStep.value = 0;
            deployForm.host_node2 = null;
            deployForm.host_node3 = null;
          } catch (e) {
            const msg = e.response?.data;
            const t = typeof msg === 'object' ? JSON.stringify(msg) : (msg || '创建任务失败');
            ElementPlus.ElMessage.error(t);
          } finally { loading.value = false; }
        };

        const attachTask = async (row) => {
          currentTaskId.value = row.id;
          taskStatus.value = row.status;
          lastAction.value = row.action || '';
          currentTaskSnapshot.value = { ...row };
          logText.value = '';
          logTailText.value = '';
          treeRoots.value = [];
          manifestSummary.value = null;
          manifestPaths.value = [];
          manifestPayload.value = null;
          selectedPipelineKey.value = '';
          selectedLogHint.value = '';
          activeMenu.value = 'deploy';
          deploySubView.value = 'monitor';
          try {
            const { data } = await api.get('/deployment/tasks/' + row.id + '/');
            currentTaskSnapshot.value = data;
            taskStatus.value = data.status;
          } catch (_) {}
          openSocket(row.id);
          fetchTasks().catch(() => {});
          const st = (currentTaskSnapshot.value && currentTaskSnapshot.value.status) || row.status;
          if (st === 'running' || st === 'pending') {
            ElementPlus.ElMessage.info('已打开任务 #' + row.id + '，下方将推送 appctl 实时输出');
          } else {
            ElementPlus.ElMessage.info('已打开任务 #' + row.id + '（已结束：' + deployStatusLabel(st) + '）。标准输出无回放时请点 precheck.log / install.log');
          }
        };

        onMounted(async () => {
          if (token.value) {
            try { await fetchHosts(); await fetchTasks(); } catch {}
          }
        });
        onUnmounted(() => { closeSocket(); closeLogSocket(); });

        return {
          token, user, loading, sidebarCollapsed, activeMenu, breadcrumbTitle, runningCount, successCount, failedCount, lastTasks, onMenuSelect,
          hosts, hostsWithCredential, hostsKeyAuth, tasks, showRegister, loginForm, regForm, hostForm, deployForm, deployStep,
          hostSubView, openHostEnroll, backToHostList,
          deploySubView, openDeployWizard, backToDeployList,
          deployWizardSteps, goDeployWizardStep,
          refreshTasksOnly, deployActionLabel, deployStatusLabel, deployStatusTagType, deployOutcomeTagType, deployTaskRowClass,
          currentTaskSnapshot, deployStatusStripVisible, deployStatusStripTitle, deployStatusStripType, liveTaskFinishedHint,
          deployElapsedHuman, manifestProgressPercent, manifestEstimatedHuman, manifestCurrentStepLine,
          logText, logTailText, logTailLabel, logAppctlEl, logFileEl, obMainEl, treeRoots, manifestSummary, manifestPaths, manifestPayload, taskStatus, currentTaskId,
          showManifestTree, showTripleNodeStrip, tripleNodeProgressList, tripleNodeRoleText, shortPath, subStatusDotClass,
          pipelineRows, displayPipelineRows, activePipelineKey, rowEffectiveLevelStatus, tripleGroupedSubs, subLabelWithoutStatus, pipelineLvPillClass, subStPillClass,
          selectedPipelineKey, selectedLogHint, phaseHint, phaseBanner, flowS1, flowS2, flowS3, flowS4,
          openLogTail, openLogTailRel, onPipelineStepClick, onPipelineSubClick,
          isHostDisabledForNode1, isHostDisabledTriple, goDeployStep2, fillUserEditTemplate,
          authMethodLabel, formatHostTime, refreshHostsPage,
          doLogin, doRegister, logout, saveHost, resetHostForm, editHost, testHost, deleteHost, startDeploy, attachTask,
        };
      }
    }).use(ElementPlus).mount('#app');
  </script>
</body>
</html>
