<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TPOPS 部署平台</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus@2.4.4/dist/index.css" />
  <style>
    :root {
      --ob-sidebar: #0b1f3a;
      --ob-sidebar-active: #1890ff;
      --ob-header-h: 56px;
      --ob-bg: #f0f2f5;
    }
    * { box-sizing: border-box; }
    html, body, #app { height: 100%; margin: 0; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
      background: var(--ob-bg);
      color: #303133;
    }
    .login-wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0b1f3a 0%, #1a3a5c 45%, #243b55 100%);
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 12px 48px rgba(0,0,0,.25);
    }
    .login-card .banner {
      background: linear-gradient(90deg, #132f4c, #1890ff);
      color: #fff;
      padding: 28px 32px;
    }
    .login-card .banner h1 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: .5px; }
    .login-card .banner p { margin: 8px 0 0; opacity: .9; font-size: 13px; }
    .login-card .body { padding: 28px 32px 32px; background: #fff; }
    .layout-root { height: 100%; }
    .ob-aside {
      background: var(--ob-sidebar);
      color: #fff;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,.06);
    }
    .ob-logo {
      height: var(--ob-header-h);
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-weight: 600;
      font-size: 16px;
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,.08);
      white-space: nowrap;
    }
    .ob-logo span { color: #69c0ff; margin-right: 8px; font-size: 20px; }
    .ob-menu { border-right: none !important; flex: 1; background: transparent !important; }
    .ob-menu.el-menu--dark { --el-menu-bg-color: transparent; --el-menu-hover-bg-color: rgba(255,255,255,.08); }
    .ob-header {
      height: var(--ob-header-h) !important;
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      box-shadow: 0 1px 4px rgba(0,21,41,.08);
    }
    .ob-breadcrumb { font-size: 14px; color: #606266; }
    .ob-breadcrumb strong { color: #303133; }
    .ob-main { padding: 20px 24px 32px; background: var(--ob-bg); overflow: auto; }
    .ob-page-title { font-size: 16px; font-weight: 600; color: #303133; margin: 0 0 16px; }
    .stat-card { border-radius: 4px; }
    .stat-card .num { font-size: 28px; font-weight: 600; color: #1890ff; line-height: 1.2; }
    .stat-card .lab { font-size: 13px; color: #909399; margin-top: 4px; }
    .log-box {
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      height: 360px;
      overflow: auto;
      padding: 12px;
      border-radius: 4px;
      white-space: pre-wrap;
      border: 1px solid #303030;
    }
    .status-none { color: #909399; }
    .status-running { color: #e6a23c; }
    .status-done { color: #67c23a; }
    .status-error { color: #f56c6c; }
    .status-null { color: #b37feb; }
    .status-retrying { color: #ff9800; }
    .hint { font-size: 12px; color: #909399; margin-top: 4px; line-height: 1.5; }
    .mono-ta textarea { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; }
    .deploy-action-rg { display: flex; flex-direction: column; align-items: stretch; gap: 10px; width: 100%; }
    .deploy-action-rg .el-radio-button { margin: 0 !important; }
    .deploy-action-rg .el-radio-button__inner { width: 100%; text-align: left; white-space: normal; height: auto; line-height: 1.45; padding: 12px 14px; }
    .flow-pipeline { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 8px 4px; padding: 16px 8px; background: #fafafa; border-radius: 8px; border: 1px solid #ebeef5; margin-bottom: 16px; }
    .flow-step { flex: 1; min-width: 72px; max-width: 140px; text-align: center; position: relative; }
    .flow-step:not(:last-child)::after { content: ''; position: absolute; top: 18px; right: -50%; width: 100%; height: 2px; background: #dcdfe6; z-index: 0; }
    .flow-step.done:not(:last-child)::after { background: #67c23a; }
    .flow-dot { width: 36px; height: 36px; border-radius: 50%; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; cursor: default; position: relative; z-index: 1; border: 2px solid #dcdfe6; background: #fff; color: #909399; transition: .2s; }
    .flow-dot.clickable { cursor: pointer; box-shadow: 0 0 0 2px rgba(24,144,255,.2); }
    .flow-dot.clickable:hover { border-color: #1890ff; color: #1890ff; }
    .flow-dot.pending { background: #f5f7fa; }
    .flow-dot.active { border-color: #e6a23c; color: #e6a23c; animation: pulse-dot 1.2s ease-in-out infinite; }
    .flow-dot.done { border-color: #67c23a; background: #f0f9ff; color: #67c23a; }
    .flow-dot.skip { background: #f4f4f5; color: #c0c4cc; border-style: dashed; }
    @keyframes pulse-dot { 0%,100%{ box-shadow: 0 0 0 0 rgba(230,162,60,.35);} 50%{ box-shadow: 0 0 0 6px rgba(230,162,60,0);} }
    .flow-cap { font-size: 12px; color: #606266; line-height: 1.35; }
    .flow-sub { font-size: 11px; color: #909399; margin-top: 4px; }
    .deploy-split { margin-top: 16px; }
    .deploy-split .el-col { min-height: 360px; }
    .pipeline-scroll { max-height: min(72vh, 760px); overflow-y: auto; padding-right: 6px; }
    .pipeline-step { margin-bottom: 16px; padding: 12px 14px 12px 16px; background: #fafafa; border-radius: 8px; border: 1px solid #ebeef5; border-left: 4px solid #dcdfe6; }
    .pipeline-step.sel { border-left-color: #1890ff; background: #f0f7ff; }
    .pipeline-head { cursor: pointer; font-size: 15px; font-weight: 600; color: #303133; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
    .pipeline-head:hover { color: #1890ff; }
    .parallel-badge { font-size: 11px; color: #909399; font-weight: 400; }
    .pipeline-sub { margin: 10px 0 0 4px; padding-left: 12px; border-left: 2px dashed #dcdfe6; }
    .pipeline-subline { font-size: 13px; color: #606266; padding: 4px 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; cursor: pointer; }
    .pipeline-subline:hover { color: #1890ff; }
    .log-deploy-main { height: min(52vh, 560px); min-height: 280px; }
    .log-deploy-sub { height: 200px; margin-top: 12px; }
    .phase-strip { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 10px 12px; background: #f5f7fa; border-radius: 6px; margin-bottom: 14px; font-size: 13px; color: #606266; }
    /* 主机管理页 */
    .host-hero {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap;
      margin-bottom: 16px; padding: 18px 20px; border-radius: 10px;
      background: linear-gradient(120deg, #0b1f3a 0%, #153a5c 55%, #1a5080 100%);
      color: #fff; box-shadow: 0 8px 24px rgba(11,31,58,.18);
    }
    .host-hero h2 { margin: 0 0 6px; font-size: 18px; font-weight: 600; color: #fff; }
    .host-hero p { margin: 0; font-size: 13px; opacity: .88; line-height: 1.5; max-width: 560px; }
    .host-hero .el-button { border-color: rgba(255,255,255,.35); color: #fff; background: rgba(255,255,255,.08); }
    .host-hero .el-button:hover { border-color: #69c0ff; color: #e6f7ff; background: rgba(255,255,255,.14); }
    .host-stat-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    .host-stat-pill {
      flex: 1; min-width: 120px; padding: 12px 16px; border-radius: 8px; background: #fff;
      border: 1px solid #e4e7ed; box-shadow: 0 1px 4px rgba(0,21,41,.06);
    }
    .host-stat-pill .n { font-size: 22px; font-weight: 600; color: #1890ff; line-height: 1.2; }
    .host-stat-pill .l { font-size: 12px; color: #909399; margin-top: 4px; }
    .host-card-accent { border-radius: 10px; overflow: hidden; border: 1px solid #e4e7ed; box-shadow: 0 2px 12px rgba(0,21,41,.06); }
    .host-card-accent > .el-card__header {
      background: linear-gradient(90deg, #f6f9fc 0%, #fff 100%);
      border-bottom: 1px solid #ebeef5; font-weight: 600;
    }
    .host-table .el-table__header th { background: #f5f7fa !important; color: #606266; font-weight: 600; }
    .host-table .mono { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; }
    .host-endpoint { font-weight: 500; color: #303133; }
    .host-sub { font-size: 12px; color: #909399; margin-top: 2px; }
    /* 部署任务列表 */
    .deploy-hero {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap;
      margin-bottom: 14px; padding: 16px 18px; border-radius: 10px;
      background: linear-gradient(118deg, #102a43 0%, #1c4d6e 50%, #1a6b8c 100%);
      color: #fff; box-shadow: 0 8px 22px rgba(16,42,67,.2);
    }
    .deploy-hero h2 { margin: 0 0 6px; font-size: 17px; font-weight: 600; color: #fff; }
    .deploy-hero p { margin: 0; font-size: 12px; opacity: .9; line-height: 1.55; max-width: 640px; }
    .deploy-hero .el-button { border-color: rgba(255,255,255,.35); color: #fff; background: rgba(255,255,255,.1); }
    .deploy-hero .el-button--primary { background: #1890ff; border-color: #1890ff; color: #fff; }
    .deploy-task-card { border-radius: 10px; overflow: hidden; border: 1px solid #e4e7ed; box-shadow: 0 2px 12px rgba(0,21,41,.06); margin-bottom: 16px; }
    .deploy-task-card > .el-card__header { background: linear-gradient(90deg, #f0f7ff 0%, #fff 100%); font-weight: 600; border-bottom: 1px solid #ebeef5; }
    .deploy-table .el-table__header th { background: #f5f7fa !important; color: #606266; font-weight: 600; }
    .deploy-table .row-current-task { background: #e6f7ff !important; }
    .deploy-table .row-current-task:hover > td { background: #d6f0ff !important; }
    .deploy-status-strip { margin-bottom: 14px; }
    .deploy-status-strip .el-alert__title { font-size: 13px; line-height: 1.55; font-weight: 500; }
    .deploy-outcome-ok { color: #67c23a; font-weight: 600; }
    .deploy-outcome-bad { color: #f56c6c; font-weight: 600; }
  </style>
</head>
<body>
  <div id="app">
    <!-- 登录（OceanBase 类控制台登录区） -->
    <div v-if="!token" class="login-wrap">
      <div class="login-card">
        <div class="banner">
          <h1>TPOPS 部署平台</h1>
          <p>集群部署 · 预检查 · 安装 · 进度与日志</p>
        </div>
        <div class="body">
          <el-form :model="loginForm" label-position="top" @keyup.enter="doLogin">
            <el-form-item label="用户名">
              <el-input v-model="loginForm.username" size="large" autocomplete="username" placeholder="请输入用户名" />
            </el-form-item>
            <el-form-item label="密码">
              <el-input v-model="loginForm.password" size="large" type="password" show-password autocomplete="current-password" placeholder="请输入密码" />
            </el-form-item>
            <el-form-item style="margin-bottom: 12px;">
              <el-button type="primary" size="large" style="width:100%" @click="doLogin" :loading="loading">登 录</el-button>
            </el-form-item>
            <div style="text-align:center;">
              <el-button link type="primary" @click="showRegister = true">注册账号</el-button>
            </div>
          </el-form>
        </div>
      </div>
    </div>

    <!-- 主布局：侧栏 + 顶栏 + 内容区 -->
    <el-container v-else class="layout-root">
      <el-aside width="220px" class="ob-aside">
        <div class="ob-logo"><span>◆</span> TPOPS 部署</div>
        <el-menu
          class="ob-menu"
          :default-active="activeMenu"
          background-color="transparent"
          text-color="rgba(255,255,255,.75)"
          active-text-color="#fff"
          @select="onMenuSelect"
        >
          <el-menu-item index="overview">
            <span>概览</span>
          </el-menu-item>
          <el-menu-item index="hosts">
            <span>主机管理</span>
          </el-menu-item>
          <el-menu-item index="deploy">
            <span>部署任务</span>
          </el-menu-item>
        </el-menu>
      </el-aside>
      <el-container direction="vertical">
        <el-header class="ob-header">
          <div class="ob-breadcrumb">
            控制台 / <strong v-text="breadcrumbTitle"></strong>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <el-tag effect="plain" type="info" v-text="user.username || '-'"></el-tag>
            <el-button type="danger" link @click="logout">退出登录</el-button>
          </div>
        </el-header>
        <el-main class="ob-main">
          <!-- 概览 -->
          <template v-if="activeMenu === 'overview'">
            <h2 class="ob-page-title">概览</h2>
            <el-row :gutter="16" style="margin-bottom:20px;">
              <el-col :xs="24" :sm="8" :md="4">
                <el-card shadow="hover" class="stat-card">
                  <div class="num" v-text="hosts.length"></div>
                  <div class="lab">已配置主机</div>
                </el-card>
              </el-col>
              <el-col :xs="24" :sm="8" :md="4">
                <el-card shadow="hover" class="stat-card">
                  <div class="num" v-text="tasks.length"></div>
                  <div class="lab">历史任务数</div>
                </el-card>
              </el-col>
              <el-col :xs="24" :sm="8" :md="4">
                <el-card shadow="hover" class="stat-card">
                  <div class="num" style="color:#e6a23c;" v-text="runningCount"></div>
                  <div class="lab">进行中</div>
                </el-card>
              </el-col>
              <el-col :xs="24" :sm="8" :md="4">
                <el-card shadow="hover" class="stat-card">
                  <div class="num" style="color:#52c41a;" v-text="successCount"></div>
                  <div class="lab">成功</div>
                </el-card>
              </el-col>
              <el-col :xs="24" :sm="8" :md="4">
                <el-card shadow="hover" class="stat-card">
                  <div class="num" style="color:#f56c6c;" v-text="failedCount"></div>
                  <div class="lab">失败</div>
                </el-card>
              </el-col>
              <el-col :xs="24" :sm="8" :md="4">
                <el-card shadow="hover" class="stat-card">
                  <div class="num" style="color:#909399;" v-text="(tasks.length ? Math.round(successCount * 100 / tasks.length) : 0) + '%'"></div>
                  <div class="lab">成功率</div>
                </el-card>
              </el-col>
            </el-row>
            <el-row :gutter="16" style="margin-bottom:20px;">
              <el-col :xs="24" :lg="14">
                <el-card shadow="never">
                  <template #header><span style="font-weight:600">平台说明</span></template>
                  <p style="margin:0 0 10px;line-height:1.7;color:#606266;">
                    本控制台用于 <strong>TPOPS / GaussDB 容器化部署</strong>：在「主机管理」登记 SSH 可达的执行机（部署根目录需含 <code>appctl.sh</code>），在「部署任务」按向导填写
                    <code>user_edit_file.conf</code> 后，系统会<strong>自动检测</strong>远程
                    <code>config/gaussdb/user_edit_file.conf</code> 或 <code>config/user_edit_file.conf</code> 是否存在并<strong>覆盖写入</strong>，再执行所选 <code>appctl.sh</code> 操作。
                  </p>
                  <el-descriptions :column="1" border size="small">
                    <el-descriptions-item label="Manifest">部署根目录下 <code>config/gaussdb/manifest.yaml</code>，任务运行中轮询解析进度树</el-descriptions-item>
                    <el-descriptions-item label="配置文件"><code>user_edit</code> 以页面填写为准原样下发；所选节点仅用于 SSH 连接与执行 appctl</el-descriptions-item>
                    <el-descriptions-item label="注意">docker-service 不建议并发执行多个 appctl；同一主机请避免并行任务。</el-descriptions-item>
                  </el-descriptions>
                </el-card>
              </el-col>
              <el-col :xs="24" :lg="10">
                <el-card shadow="never">
                  <template #header><span style="font-weight:600">快速开始</span></template>
                  <el-steps direction="vertical" :active="4" finish-status="success">
                    <el-step title="登记主机" description="SSH、部署根目录 /data/docker-service" />
                    <el-step title="选择部署形态" description="单节点或三节点形态" />
                    <el-step title="选择节点" description="节点 1 必填；三节点时 2/3 可选" />
                    <el-step title="配置与下发" description="编辑 user_edit 并选择 appctl 操作" />
                  </el-steps>
                </el-card>
              </el-col>
            </el-row>

            <el-row :gutter="16">
              <el-col :xs="24" :lg="14">
                <el-card shadow="never">
                  <template #header><span style="font-weight:600">已纳管主机</span></template>
                  <el-table v-if="hosts.length" :data="hosts" stripe size="small" max-height="280" class="host-table">
                    <el-table-column prop="name" label="名称" width="120" show-overflow-tooltip />
                    <el-table-column label="连接" min-width="150">
                      <template #default="{ row }">
                        <span class="host-endpoint mono">{{ row.hostname }}:{{ row.port }}</span>
                        <div class="host-sub">{{ row.username }} · {{ authMethodLabel(row.auth_method) }}</div>
                      </template>
                    </el-table-column>
                    <el-table-column prop="docker_service_root" label="部署根目录" min-width="160" show-overflow-tooltip />
                    <el-table-column label="凭证" width="80" align="center">
                      <template #default="{ row }">
                        <el-tag :type="row.has_credential ? 'success' : 'warning'" size="small" effect="plain">{{ row.has_credential ? '已配' : '未配' }}</el-tag>
                      </template>
                    </el-table-column>
                  </el-table>
                  <el-empty v-else description="暂无主机，请前往「主机管理」添加" />
                </el-card>
              </el-col>
              <el-col :xs="24" :lg="10">
                <el-card shadow="never">
                  <template #header><span style="font-weight:600">最近任务</span></template>
                  <el-table v-if="lastTasks.length" :data="lastTasks" stripe size="small" max-height="280">
                    <el-table-column prop="id" label="ID" width="56" />
                    <el-table-column prop="host_name" label="节点1" min-width="90" show-overflow-tooltip />
                    <el-table-column prop="deploy_mode" label="形态" width="72" />
                    <el-table-column label="操作" min-width="100" show-overflow-tooltip>
                      <template #default="{ row }"><span v-text="deployActionLabel(row.action)"></span></template>
                    </el-table-column>
                    <el-table-column label="结果" width="88" align="center">
                      <template #default="{ row }">
                        <el-tag size="small" :type="deployOutcomeTagType(row.status)" effect="dark">{{ row.outcome_label || deployStatusLabel(row.status) }}</el-tag>
                      </template>
                    </el-table-column>
                  </el-table>
                  <el-empty v-else description="暂无任务记录" />
                </el-card>
              </el-col>
            </el-row>
          </template>

          <!-- 主机管理 -->
          <template v-else-if="activeMenu === 'hosts'">
            <div class="host-hero">
              <div>
                <h2>主机纳管</h2>
                <p>维护 SSH 连接与远程部署根目录；列表展示端口、用户、认证方式、凭证是否已保存等。仅本人创建的主机及历史未绑定账号的主机对本账号可见。</p>
              </div>
              <el-button :loading="loading" @click="refreshHostsPage">
                <span style="margin-right:4px">↻</span> 刷新列表
              </el-button>
            </div>
            <div class="host-stat-row">
              <div class="host-stat-pill"><div class="n" v-text="hosts.length"></div><div class="l">已纳管主机</div></div>
              <div class="host-stat-pill"><div class="n" v-text="hostsWithCredential"></div><div class="l">已配置 SSH 凭证</div></div>
              <div class="host-stat-pill"><div class="n" v-text="hostsKeyAuth"></div><div class="l">密钥登录</div></div>
            </div>
            <el-row :gutter="16">
              <el-col :xs="24" :lg="9">
                <el-card shadow="never" class="host-card-accent">
                  <template #header><span>{{ hostForm.id ? '编辑主机' : '添加主机' }}</span></template>
                  <el-form :model="hostForm" label-width="112px" size="default">
                    <el-form-item label="显示名称">
                      <el-input v-model="hostForm.name" placeholder="如：生产节点-1" />
                    </el-form-item>
                    <el-form-item label="IP / 域名">
                      <el-input v-model="hostForm.hostname" placeholder="SSH 地址" />
                    </el-form-item>
                    <el-form-item label="SSH 端口">
                      <el-input-number v-model="hostForm.port" :min="1" :max="65535" style="width:100%" />
                    </el-form-item>
                    <el-form-item label="SSH 用户">
                      <el-input v-model="hostForm.username" placeholder="如 root" />
                    </el-form-item>
                    <el-form-item label="认证方式">

        const selectedLogHint = ref('');
        const taskStatus = ref('');
        const currentTaskId = ref(null);
        const currentTaskSnapshot = ref(null);
        const lastAction = ref('');
        const phaseHint = ref('');
        const phaseBanner = ref('');
        const flowS1 = ref('pending');
        const flowS2 = ref('pending');
        const flowS3 = ref('pending'); // manifest 轮询
        const flowS4 = ref('pending'); // install.log
        let socket = null;
        let logSocket = null;

        const showManifestTree = computed(() => {
          const a = lastAction.value || '';
          return a === 'install' || a === 'upgrade';
        });

        const pipelineRows = computed(() => {
          const p = manifestPayload.value;
          if (p && p.pipeline && p.pipeline.length) return p.pipeline;
          return [];
        });

        const breadcrumbTitle = computed(() => {
          const m = { overview: '概览', hosts: '主机管理', deploy: '部署任务' };
          return m[activeMenu.value] || '';
        });

        const runningCount = computed(() => tasks.value.filter(t => t.status === 'running').length);
        const successCount = computed(() => tasks.value.filter(t => t.status === 'success').length);
        const failedCount = computed(() => tasks.value.filter(t => t.status === 'failed').length);
        const lastTasks = computed(() => tasks.value.slice(0, 8));
        const hostsWithCredential = computed(() => hosts.value.filter(h => h.has_credential).length);
        const hostsKeyAuth = computed(() => hosts.value.filter(h => h.auth_method === 'key').length);

        const deployStep = ref(0);

        const onMenuSelect = (key) => {
          activeMenu.value = key;
          if (key === 'deploy' && token.value) {
            fetchTasks().catch(() => {});
          }
        };

        const isHostDisabledForNode1 = (hid) => {
          if (deployForm.deploy_mode !== 'triple') return false;
          return hid === deployForm.host_node2 || hid === deployForm.host_node3;
        };
        const isHostDisabledTriple = (hid, slot) => {
          if (deployForm.deploy_mode !== 'triple') return false;
          if (hid === deployForm.host) return true;
          if (slot === 2) return hid === deployForm.host_node3;
          if (slot === 3) return hid === deployForm.host_node2;
          return false;
        };

        const goDeployStep2 = () => {
          if (!deployForm.host) return ElementPlus.ElMessage.warning('请选择节点 1（执行机）');
          if (deployForm.deploy_mode === 'triple') {
            const ids = [deployForm.host, deployForm.host_node2, deployForm.host_node3].filter(Boolean);
            if (new Set(ids).size !== ids.length)
              return ElementPlus.ElMessage.warning('所选主机不能重复');
          }
          if (!(deployForm.user_edit_content || '').trim()) {
            deployForm.user_edit_content = USER_EDIT_TEMPLATE;
          }
          deployStep.value = 2;
        };

        const fillUserEditTemplate = () => {
          deployForm.user_edit_content = USER_EDIT_TEMPLATE;
          ElementPlus.ElMessage.success('已恢复为默认模板');
        };

        watch(() => deployForm.deploy_mode, (v) => {
          if (v === 'single') {
            deployForm.host_node2 = null;
            deployForm.host_node3 = null;
          }
        });

        const setAuth = (access, refToken, u) => {
          token.value = access || '';
          refresh.value = refToken || '';
          if (access) localStorage.setItem('access', access); else localStorage.removeItem('access');
          if (refToken) localStorage.setItem('refresh', refToken); else localStorage.removeItem('refresh');
          if (u) { user.value = u; localStorage.setItem('user', JSON.stringify(u)); }
        };

        api.interceptors.request.use(cfg => {
          if (token.value) cfg.headers.Authorization = 'Bearer ' + token.value;
          return cfg;
        });

        api.interceptors.response.use(r => r, async err => {
          const orig = err.config;
          if (err.response && err.response.status === 401 && refresh.value && !orig._retry) {
            orig._retry = true;
            try {
              const { data } = await axios.post('/api/auth/token/refresh/', { refresh: refresh.value });
              setAuth(data.access, refresh.value, user.value);
              orig.headers.Authorization = 'Bearer ' + token.value;
              return api(orig);
            } catch (e) {
              setAuth('', '', null);
            }
          }
          return Promise.reject(err);
        });

        const fetchHosts = async () => {
          const { data } = await api.get('/hosts/');
          hosts.value = Array.isArray(data) ? data : (data.results || []);
        };

        const refreshHostsPage = async () => {
          loading.value = true;
          try {
            await fetchHosts();
            ElementPlus.ElMessage.success('列表已更新');
          } catch (e) {
            ElementPlus.ElMessage.error('刷新失败');
          } finally { loading.value = false; }
        };

        const authMethodLabel = (m) => (m === 'key' ? '密钥' : '密码');
        const formatHostTime = (iso) => {
          if (!iso) return '—';
          const d = new Date(iso);
          if (Number.isNaN(d.getTime())) return String(iso).slice(0, 19).replace('T', ' ');
          return d.toLocaleString('zh-CN', { hour12: false });
        };
        const fetchTasks = async () => {
          const { data } = await api.get('/deployment/tasks/');
          tasks.value = Array.isArray(data) ? data : (data.results || []);
        };

        const refreshTasksOnly = async () => {
          loading.value = true;
          try {
            await fetchTasks();
            ElementPlus.ElMessage.success('部署列表已更新');
          } catch (e) {
            ElementPlus.ElMessage.error('刷新失败');
          } finally { loading.value = false; }
        };

        const deployActionLabel = (a) => {
          const m = {
            precheck_install: '安装前置检查',
            precheck_upgrade: '升级前置检查',
            install: '安装',
            upgrade: '升级',
          };
          return m[a] || a || '—';
        };

        const deployStatusLabel = (s) => {
          const m = {
            pending: '待执行',
            running: '执行中',
            success: '成功',
            failed: '失败',
            cancelled: '已取消',
          };
          return m[s] || s || '—';
        };

        const deployStatusTagType = (s) => {
          if (s === 'success') return 'success';
          if (s === 'failed') return 'danger';
          if (s === 'running') return 'warning';
          if (s === 'cancelled') return 'info';
          return '';
        };

        const deployOutcomeTagType = (s) => {
          if (s === 'success') return 'success';
          if (s === 'failed') return 'danger';
          if (s === 'running') return 'warning';
          if (s === 'cancelled') return 'info';
          return 'info';
        };

        const deployTaskRowClass = ({ row }) => (currentTaskId.value && row.id === currentTaskId.value ? 'row-current-task' : '');

        const applyLiveTaskPatch = (partial) => {
          const id = currentTaskId.value;
          if (!id) return;
          let cur = currentTaskSnapshot.value;
          if (!cur || cur.id !== id) cur = { id };
          currentTaskSnapshot.value = { ...cur, ...partial };
        };

        const deployStatusStripVisible = computed(() => Boolean(currentTaskId.value));

        const effectiveLiveStatus = computed(() => {
          const s = currentTaskSnapshot.value;
          if (s && s.status) return s.status;
          const raw = taskStatus.value || '';
          if (raw.startsWith('finished:')) {
            const code = parseInt(raw.split(':')[1], 10);
            return Number.isNaN(code) ? '' : (code === 0 ? 'success' : 'failed');
          }
          return raw;
        });

        const deployStatusStripType = computed(() => {
          const st = effectiveLiveStatus.value;
          if (st === 'success') return 'success';
          if (st === 'failed') return 'error';
          if (st === 'running') return 'warning';
          return 'info';
        });

        const deployStatusStripTitle = computed(() => {
          const id = currentTaskId.value;
          if (!id) return '';
          const s = currentTaskSnapshot.value;
          const st = effectiveLiveStatus.value;
          const label = (s && s.outcome_label) || deployStatusLabel(st);
          const action = deployActionLabel((s && s.action) || lastAction.value);
          const parts = ['当前查看任务 #' + id, '操作：' + action, '结果：' + label];
          if (s && s.exit_code != null && (st === 'success' || st === 'failed' || st === 'cancelled'))
            parts.push('退出码 ' + s.exit_code);
          if (s && s.finished_at) parts.push('结束 ' + formatHostTime(s.finished_at));
          else if (s && s.started_at && st === 'running') parts.push('开始 ' + formatHostTime(s.started_at));
          return parts.join(' · ');
        });

        const liveTaskFinishedHint = computed(() => {
          const id = currentTaskId.value;
          if (!id) return '';
          const s = currentTaskSnapshot.value;
          const st = (s && s.status) || effectiveLiveStatus.value;
          if (st === 'success' || st === 'failed' || st === 'cancelled') {
            const ec = s && s.exit_code != null ? s.exit_code : '—';
            return '任务 #' + id + ' 已结束（' + deployStatusLabel(st) + '，退出码 ' + ec + '）。上方 appctl 窗口无历史回放时，请点击流水线区域的 precheck.log / install.log 查看远程文件日志。';
          }
          return '';
        });

        const refreshCurrentTaskSnapshot = async () => {
          const id = currentTaskId.value;
          if (!id) return;
          try {
            const { data } = await api.get('/deployment/tasks/' + id + '/');
            currentTaskSnapshot.value = data;
            taskStatus.value = data.status;
            const idx = tasks.value.findIndex((t) => t.id === id);
            if (idx >= 0) {
              const next = tasks.value.slice();
              next[idx] = { ...next[idx], ...data };
              tasks.value = next;
            }
          } catch (_) {}
        };

        const scrollLogEl = (elRef) => {
          nextTick(() => {
            const el = elRef && elRef.value;
            if (el && typeof el.scrollTop === 'number') {
              el.scrollTop = el.scrollHeight;
            }
          });
        };

        watch(logText, () => scrollLogEl(logAppctlEl));
        watch(logTailText, () => scrollLogEl(logFileEl));

        const resetFlow = () => {
          flowS1.value = 'pending';
          flowS2.value = 'pending';
          flowS3.value = 'pending';
          flowS4.value = 'pending';
          phaseHint.value = '';
          phaseBanner.value = '';
          manifestPaths.value = [];
          manifestPayload.value = null;
          selectedPipelineKey.value = '';
          selectedLogHint.value = '';
        };

        const closeSocket = () => {
          if (socket) { socket.close(); socket = null; }
        };
        const closeLogSocket = () => {
          if (logSocket) { logSocket.close(); logSocket = null; }
        };

        const openLogTail = (kind) => {
          if (!currentTaskId.value) return ElementPlus.ElMessage.warning('请先创建或订阅任务');
          closeLogSocket();
          logTailText.value = '';
          logTailLabel.value = kind === 'install' ? 'install.log' : 'precheck.log';
          const proto = location.protocol === 'https:' ? 'wss' : 'ws';
          const url = `${proto}://${location.host}/ws/deploy/${currentTaskId.value}/log/?token=${encodeURIComponent(token.value)}&kind=${encodeURIComponent(kind)}`;
          logSocket = new WebSocket(url);
          logSocket.onmessage = (ev) => {
            let msg;
            try { msg = JSON.parse(ev.data); } catch { return; }
            if (msg.type === 'chunk' && msg.data) {
              logTailText.value += msg.data;
              scrollLogEl(logFileEl);
            }
            if (msg.type === 'meta') logTailLabel.value = (msg.path || '') + ' (' + (msg.kind || '') + ')';
            if (msg.type === 'error') ElementPlus.ElMessage.error(msg.message || '日志错误');
          };
          logSocket.onerror = () => ElementPlus.ElMessage.error('日志 WebSocket 错误');
        };

        const openLogTailRel = (relFile, hint) => {
          if (!currentTaskId.value) return ElementPlus.ElMessage.warning('请先创建或订阅任务');
          closeLogSocket();
          logTailText.value = '';
          logTailLabel.value = hint || relFile;
          const proto = location.protocol === 'https:' ? 'wss' : 'ws';
          const url = `${proto}://${location.host}/ws/deploy/${currentTaskId.value}/log/?token=${encodeURIComponent(token.value)}&rel=${encodeURIComponent(relFile)}`;
          logSocket = new WebSocket(url);
          logSocket.onmessage = (ev) => {
            let msg;
            try { msg = JSON.parse(ev.data); } catch { return; }
            if (msg.type === 'chunk' && msg.data) {
              logTailText.value += msg.data;
              scrollLogEl(logFileEl);
            }
            if (msg.type === 'meta') logTailLabel.value = (msg.path || '') + (hint ? ' · ' + hint : '');
            if (msg.type === 'error') ElementPlus.ElMessage.error(msg.message || '日志错误');
          };
          logSocket.onerror = () => ElementPlus.ElMessage.error('日志 WebSocket 错误');
        };

        const logKindForTask = () => {
          const a = lastAction.value || '';
          return a.startsWith('precheck') ? 'precheck' : 'install';
        };

        const onPipelineStepClick = (row) => {
          selectedPipelineKey.value = row.key || '';
          selectedLogHint.value = row.title || '';
          openLogTail(logKindForTask());
        };

        const onPipelineSubClick = (sub, row) => {
          selectedPipelineKey.value = row.key || '';
          selectedLogHint.value = (row.title || '') + ' → ' + (sub.label || '');
          openLogTail(logKindForTask());
        };

        const openSocket = (taskId) => {
          closeSocket();
          closeLogSocket();
          resetFlow();
          logTailText.value = '';
          const proto = location.protocol === 'https:' ? 'wss' : 'ws';
          const url = `${proto}://${location.host}/ws/deploy/${taskId}/?token=${encodeURIComponent(token.value)}`;
          socket = new WebSocket(url);
          socket.onmessage = (ev) => {
            let msg;
            try { msg = JSON.parse(ev.data); } catch { return; }
            if (msg.type === 'hello') {
              taskStatus.value = msg.status;
              if (msg.action) lastAction.value = msg.action;
              applyLiveTaskPatch({
                id: msg.task_id,
                action: msg.action,
                status: msg.status,
                exit_code: msg.exit_code,
                error_message: msg.error_message,
                finished_at: msg.finished_at,
                started_at: msg.started_at,
              });
            }
            if (msg.type === 'phase') {
              phaseBanner.value = msg.message || '';
              if (msg.paths && msg.paths.length) {
                phaseHint.value = '轮询: ' + msg.paths.join(', ');
              } else if (msg.paths_tried && msg.paths_tried.length) {
                phaseHint.value = '检测: ' + msg.paths_tried.join(', ');
              } else {
                phaseHint.value = msg.command || '';
              }
              if (msg.phase === 'run_appctl') { flowS1.value = 'active'; }
              if (msg.phase === 'manifest_polling') {
                flowS1.value = 'active';
                flowS3.value = 'active';
                flowS4.value = 'pending';
              }
              if (msg.phase === 'wait_init_in_stdout') {
                /* 兼容旧后端；新逻辑为 manifest_polling */
                flowS1.value = 'active';
                flowS3.value = 'active';
                flowS4.value = 'pending';
              }
              if (msg.phase === 'init_manifest_ready') {
                flowS3.value = 'active';
                flowS4.value = 'active';
              }
              if (msg.phase === 'manifest_skipped') {
                flowS3.value = 'skip';
                flowS4.value = 'skip';
              }
              if (msg.phase === 'precheck_no_manifest') {
                flowS3.value = 'skip';
                flowS4.value = 'skip';
              }
            }
            if (msg.type === 'log' && msg.data) logText.value += msg.data;
            if (msg.type === 'manifest' && msg.data) {
              manifestPayload.value = msg.data;
              if (msg.data.roots) treeRoots.value = msg.data.roots;
              manifestSummary.value = msg.data.summary || null;
              if (msg.data.manifest_paths) manifestPaths.value = msg.data.manifest_paths;
              flowS3.value = 'active';
              flowS4.value = 'active';
            }
            if (msg.type === 'manifest_wait') {
              let t = (msg.message || '') + (msg.paths ? ' — ' + msg.paths.join(', ') : '');
              if (msg.details && msg.details.length) t += ' | ' + msg.details.join(' | ');
              phaseHint.value = t;
            }
            if (msg.type === 'status') {
              taskStatus.value = msg.data;
              applyLiveTaskPatch({ status: msg.data });
              if (msg.data === 'running') flowS1.value = 'active';
            }
            if (msg.type === 'done') {
              const st = msg.status || (msg.exit_code === 0 ? 'success' : 'failed');
              taskStatus.value = st;
              applyLiveTaskPatch({
                status: st,
                exit_code: msg.exit_code,
                finished_at: msg.finished_at,
              });
              flowS1.value = 'done';
              const a = lastAction.value || '';
              if (a === 'precheck_install' || a === 'precheck_upgrade') {
                flowS2.value = 'done';
                flowS3.value = 'skip';
                flowS4.value = 'skip';
              } else {
                flowS2.value = 'done';
                flowS3.value = flowS3.value === 'skip' ? 'skip' : 'done';
                flowS4.value = 'done';
              }
              refreshCurrentTaskSnapshot();
              fetchTasks().catch(() => {});
            }
          };
          socket.onerror = () => ElementPlus.ElMessage.error('WebSocket 错误');
        };

        const doLogin = async () => {
          loading.value = true;
          try {
            const { data } = await api.post('/auth/login/', loginForm);
            setAuth(data.token.access, data.token.refresh, data.user);
            ElementPlus.ElMessage.success('登录成功');
            activeMenu.value = 'overview';
            await fetchHosts();
            await fetchTasks();
          } catch (e) {
            ElementPlus.ElMessage.error(e.response?.data?.detail || '登录失败');
          } finally { loading.value = false; }
        };

        const doRegister = async () => {
          loading.value = true;
          try {
            await api.post('/auth/register/', regForm);
            ElementPlus.ElMessage.success('注册成功，请登录');
            showRegister.value = false;
          } catch (e) {
            ElementPlus.ElMessage.error('注册失败');
          } finally { loading.value = false; }
        };

        const logout = () => {
          closeSocket();
          closeLogSocket();
          setAuth('', '', null);
          localStorage.removeItem('user');
          logText.value = '';
          logTailText.value = '';
          treeRoots.value = [];
          manifestSummary.value = null;
          manifestPaths.value = [];
          manifestPayload.value = null;
          selectedPipelineKey.value = '';
          selectedLogHint.value = '';
          currentTaskSnapshot.value = null;
          currentTaskId.value = null;
          taskStatus.value = '';
        };

        const resetHostForm = () => {
          Object.assign(hostForm, { id: null, name: '', hostname: '', port: 22, username: 'root', auth_method: 'password', password: '', private_key: '', docker_service_root: '/data/docker-service' });
        };

        const saveHost = async () => {
          loading.value = true;
          try {
            if (hostForm.id) {
              await api.patch('/hosts/' + hostForm.id + '/', hostForm);
            } else {
              await api.post('/hosts/', hostForm);
            }
            ElementPlus.ElMessage.success('已保存');
            resetHostForm();
            await fetchHosts();
          } catch (e) {
            ElementPlus.ElMessage.error('保存失败');
          } finally { loading.value = false; }
        };

        const editHost = (row) => {
          Object.assign(hostForm, { ...row, password: '', private_key: '' });
        };

        const testHost = async (row) => {
          row._testing = true;
          try {
            const { data } = await api.post('/hosts/' + row.id + '/test_connection/');
            if (data.ok) ElementPlus.ElMessage.success(data.message);
            else ElementPlus.ElMessage.error(data.message);
          } finally { row._testing = false; }
        };

        const deleteHost = async (row) => {
          try {
            await ElementPlus.ElMessageBox.confirm(
              '确定删除主机「' + (row.name || row.hostname) + '」？此操作不可恢复。',
              '删除确认',
              { type: 'warning', confirmButtonText: '删除', cancelButtonText: '取消' }
            );
          } catch { return; }
          loading.value = true;
          try {
            await api.delete('/hosts/' + row.id + '/');
            ElementPlus.ElMessage.success('已删除');
            if (hostForm.id === row.id) resetHostForm();
            await fetchHosts();
          } catch (e) {
            ElementPlus.ElMessage.error('删除失败');
          } finally { loading.value = false; }
        };

        const startDeploy = async () => {
          if (!deployForm.host) return ElementPlus.ElMessage.warning('请选择节点 1');
          if (!(deployForm.user_edit_content || '').trim())
            return ElementPlus.ElMessage.warning('请填写或保留默认 user_edit 配置');
          if (deployForm.deploy_mode === 'triple') {
            const ids = [deployForm.host, deployForm.host_node2, deployForm.host_node3].filter(Boolean);
            if (new Set(ids).size !== ids.length)
              return ElementPlus.ElMessage.warning('所选主机不能重复');
          }
          loading.value = true;
          logText.value = '';
          logTailText.value = '';
          treeRoots.value = [];
          manifestSummary.value = null;
          manifestPaths.value = [];
          manifestPayload.value = null;
          selectedPipelineKey.value = '';
          selectedLogHint.value = '';
          lastAction.value = deployForm.action;
          try {
            const body = {
              host: deployForm.host,
              deploy_mode: deployForm.deploy_mode,
              user_edit_content: deployForm.user_edit_content,
              action: deployForm.action,
              target: deployForm.target,
            };
            if (deployForm.deploy_mode === 'triple') {
              body.host_node2 = deployForm.host_node2;
              body.host_node3 = deployForm.host_node3;
            }
            const { data } = await api.post('/deployment/tasks/', body);
            currentTaskId.value = data.id;
            taskStatus.value = data.status;
            currentTaskSnapshot.value = data;
            openSocket(data.id);
            await fetchTasks();
            ElementPlus.ElMessage.success('任务已创建');
            deployStep.value = 0;
            deployForm.host_node2 = null;
            deployForm.host_node3 = null;
          } catch (e) {
            const msg = e.response?.data;
            const t = typeof msg === 'object' ? JSON.stringify(msg) : (msg || '创建任务失败');
            ElementPlus.ElMessage.error(t);
          } finally { loading.value = false; }
        };

        const attachTask = async (row) => {
          currentTaskId.value = row.id;
          taskStatus.value = row.status;
          lastAction.value = row.action || '';
          currentTaskSnapshot.value = { ...row };
          logText.value = '';
          logTailText.value = '';
          treeRoots.value = [];
          manifestSummary.value = null;
          manifestPaths.value = [];
          manifestPayload.value = null;
          selectedPipelineKey.value = '';
          selectedLogHint.value = '';
          activeMenu.value = 'deploy';
          try {
            const { data } = await api.get('/deployment/tasks/' + row.id + '/');
            currentTaskSnapshot.value = data;
            taskStatus.value = data.status;
          } catch (_) {}
          openSocket(row.id);
          fetchTasks().catch(() => {});
          const st = (currentTaskSnapshot.value && currentTaskSnapshot.value.status) || row.status;
          if (st === 'running' || st === 'pending') {
            ElementPlus.ElMessage.info('已打开任务 #' + row.id + '，下方将推送 appctl 实时输出');
          } else {
            ElementPlus.ElMessage.info('已打开任务 #' + row.id + '（已结束：' + deployStatusLabel(st) + '）。标准输出无回放时请点 precheck.log / install.log');
          }
        };

        onMounted(async () => {
          if (token.value) {
            try { await fetchHosts(); await fetchTasks(); } catch {}
          }
        });
        onUnmounted(() => { closeSocket(); closeLogSocket(); });

        return {
          token, user, loading, activeMenu, breadcrumbTitle, runningCount, successCount, failedCount, lastTasks, onMenuSelect,
          hosts, hostsWithCredential, hostsKeyAuth, tasks, showRegister, loginForm, regForm, hostForm, deployForm, deployStep,
          refreshTasksOnly, deployActionLabel, deployStatusLabel, deployStatusTagType, deployOutcomeTagType, deployTaskRowClass,
          currentTaskSnapshot, deployStatusStripVisible, deployStatusStripTitle, deployStatusStripType, liveTaskFinishedHint,
