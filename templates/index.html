<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TPOPS 部署平台</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus@2.4.4/dist/index.css" />
  <style>
    :root {
      --ob-sidebar: #0b1f3a;
      --ob-sidebar-active: #1890ff;
      --ob-header-h: 56px;
      --ob-bg: #f0f2f5;
    }
    * { box-sizing: border-box; }
    html, body, #app { height: 100%; margin: 0; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
      background: var(--ob-bg);
      color: #303133;
    }
    .login-wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0b1f3a 0%, #1a3a5c 45%, #243b55 100%);
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 12px 48px rgba(0,0,0,.25);
    }
    .login-card .banner {
      background: linear-gradient(90deg, #132f4c, #1890ff);
      color: #fff;
      padding: 28px 32px;
    }
    .login-card .banner h1 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: .5px; }
    .login-card .banner p { margin: 8px 0 0; opacity: .9; font-size: 13px; }
    .login-card .body { padding: 28px 32px 32px; background: #fff; }
    .layout-root { height: 100%; }
    .ob-aside {
      background: var(--ob-sidebar);
      color: #fff;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,.06);
    }
    .ob-logo {
      height: var(--ob-header-h);
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-weight: 600;
      font-size: 16px;
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,.08);
      white-space: nowrap;
    }
    .ob-logo span { color: #69c0ff; margin-right: 8px; font-size: 20px; }
    .ob-menu { border-right: none !important; flex: 1; background: transparent !important; }
    .ob-menu.el-menu--dark { --el-menu-bg-color: transparent; --el-menu-hover-bg-color: rgba(255,255,255,.08); }
    .ob-header {
      height: var(--ob-header-h) !important;
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      box-shadow: 0 1px 4px rgba(0,21,41,.08);
    }
    .ob-breadcrumb { font-size: 14px; color: #606266; }
    .ob-breadcrumb strong { color: #303133; }
    .ob-main { padding: 20px 24px 32px; background: var(--ob-bg); overflow: auto; }
    .ob-page-title { font-size: 16px; font-weight: 600; color: #303133; margin: 0 0 16px; }
    .stat-card { border-radius: 4px; }
    .stat-card .num { font-size: 28px; font-weight: 600; color: #1890ff; line-height: 1.2; }
    .stat-card .lab { font-size: 13px; color: #909399; margin-top: 4px; }
    .log-box {
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      height: 360px;
      overflow: auto;
      padding: 12px;
      border-radius: 4px;
      white-space: pre-wrap;
      border: 1px solid #303030;
    }
    .status-none { color: #909399; }
    .status-running { color: #e6a23c; }
    .status-done { color: #67c23a; }
    .status-error { color: #f56c6c; }
    .status-null { color: #b37feb; }
    .status-retrying { color: #ff9800; }
    .hint { font-size: 12px; color: #909399; margin-top: 4px; line-height: 1.5; }
    .mono-ta textarea { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; }
    .deploy-action-rg { display: flex; flex-direction: column; align-items: stretch; gap: 10px; width: 100%; }
    .deploy-action-rg .el-radio-button { margin: 0 !important; }
    .deploy-action-rg .el-radio-button__inner { width: 100%; text-align: left; white-space: normal; height: auto; line-height: 1.45; padding: 12px 14px; }
    .flow-pipeline { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 8px 4px; padding: 16px 8px; background: #fafafa; border-radius: 8px; border: 1px solid #ebeef5; margin-bottom: 16px; }
    .flow-step { flex: 1; min-width: 72px; max-width: 140px; text-align: center; position: relative; }
    .flow-step:not(:last-child)::after { content: ''; position: absolute; top: 18px; right: -50%; width: 100%; height: 2px; background: #dcdfe6; z-index: 0; }
    .flow-step.done:not(:last-child)::after { background: #67c23a; }
    .flow-dot { width: 36px; height: 36px; border-radius: 50%; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; cursor: default; position: relative; z-index: 1; border: 2px solid #dcdfe6; background: #fff; color: #909399; transition: .2s; }
    .flow-dot.clickable { cursor: pointer; box-shadow: 0 0 0 2px rgba(24,144,255,.2); }
    .flow-dot.clickable:hover { border-color: #1890ff; color: #1890ff; }
    .flow-dot.pending { background: #f5f7fa; }
    .flow-dot.active { border-color: #e6a23c; color: #e6a23c; animation: pulse-dot 1.2s ease-in-out infinite; }
    .flow-dot.done { border-color: #67c23a; background: #f0f9ff; color: #67c23a; }
    .flow-dot.skip { background: #f4f4f5; color: #c0c4cc; border-style: dashed; }
    @keyframes pulse-dot { 0%,100%{ box-shadow: 0 0 0 0 rgba(230,162,60,.35);} 50%{ box-shadow: 0 0 0 6px rgba(230,162,60,0);} }
    .flow-cap { font-size: 12px; color: #606266; line-height: 1.35; }
    .flow-sub { font-size: 11px; color: #909399; margin-top: 4px; }
    .log-stack { display: flex; flex-direction: column; gap: 16px; margin-top: 16px; }
    .log-box-tall { height: min(42vh, 420px); min-height: 280px; }
    .manifest-level-block { margin-bottom: 18px; padding: 14px 16px; background: #fafafa; border: 1px solid #ebeef5; border-radius: 8px; }
    .manifest-level-title { font-weight: 600; font-size: 14px; color: #303133; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .svc-pipeline { display: flex; align-items: flex-start; flex-wrap: wrap; gap: 0 4px; }
    .svc-step-wrap { display: flex; align-items: center; flex: 0 0 auto; max-width: 120px; }
    .svc-connector { width: 20px; height: 2px; background: #dcdfe6; flex-shrink: 0; margin-top: 15px; }
    .svc-connector.done { background: #67c23a; }
    .svc-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; cursor: pointer; border: 2px solid #dcdfe6; background: #fff; color: #606266; transition: .2s; flex-shrink: 0; }
    .svc-dot:hover { border-color: #1890ff; color: #1890ff; box-shadow: 0 0 0 3px rgba(24,144,255,.12); }
    .svc-dot.pending { background: #f5f7fa; color: #909399; }
    .svc-dot.active { border-color: #e6a23c; color: #e6a23c; animation: pulse-dot 1.2s ease-in-out infinite; }
    .svc-dot.done { border-color: #67c23a; background: #f0f9eb; color: #52c41a; }
    .svc-dot.error { border-color: #f56c6c; background: #fef0f0; color: #f56c6c; }
    .svc-cap { font-size: 11px; color: #606266; text-align: center; margin-top: 6px; line-height: 1.25; max-width: 100px; word-break: break-all; }
    .phase-strip { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 10px 12px; background: #f5f7fa; border-radius: 6px; margin-bottom: 14px; font-size: 13px; color: #606266; }
  </style>
</head>
<body>
  <div id="app">
    <!-- 登录（OceanBase 类控制台登录区） -->
    <div v-if="!token" class="login-wrap">
      <div class="login-card">
        <div class="banner">
          <h1>TPOPS 部署平台</h1>
          <p>集群部署 · 预检查 · 安装 · 进度与日志</p>
        </div>
        <div class="body">
          <el-form :model="loginForm" label-position="top" @keyup.enter="doLogin">
            <el-form-item label="用户名">
              <el-input v-model="loginForm.username" size="large" autocomplete="username" placeholder="请输入用户名" />
            </el-form-item>
            <el-form-item label="密码">
              <el-input v-model="loginForm.password" size="large" type="password" show-password autocomplete="current-password" placeholder="请输入密码" />
            </el-form-item>
            <el-form-item style="margin-bottom: 12px;">
              <el-button type="primary" size="large" style="width:100%" @click="doLogin" :loading="loading">登 录</el-button>
            </el-form-item>
            <div style="text-align:center;">
              <el-button link type="primary" @click="showRegister = true">注册账号</el-button>
            </div>
          </el-form>
        </div>
      </div>
    </div>

    <!-- 主布局：侧栏 + 顶栏 + 内容区 -->
    <el-container v-else class="layout-root">
      <el-aside width="220px" class="ob-aside">
        <div class="ob-logo"><span>◆</span> TPOPS 部署</div>
        <el-menu
          class="ob-menu"
          :default-active="activeMenu"
          background-color="transparent"
          text-color="rgba(255,255,255,.75)"
          active-text-color="#fff"
          @select="onMenuSelect"
        >
          <el-menu-item index="overview">
            <span>概览</span>
          </el-menu-item>
          <el-menu-item index="hosts">
            <span>主机管理</span>
          </el-menu-item>
          <el-menu-item index="deploy">
            <span>部署任务</span>
          </el-menu-item>
        </el-menu>
      </el-aside>
      <el-container direction="vertical">
        <el-header class="ob-header">
          <div class="ob-breadcrumb">
            控制台 / <strong v-text="breadcrumbTitle"></strong>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <el-tag effect="plain" type="info" v-text="user.username || '-'"></el-tag>
            <el-button type="danger" link @click="logout">退出登录</el-button>
          </div>
        </el-header>
        <el-main class="ob-main">
          <!-- 概览 -->
          <template v-if="activeMenu === 'overview'">
            <h2 class="ob-page-title">概览</h2>
            <el-row :gutter="16" style="margin-bottom:20px;">
              <el-col :xs="24" :sm="8" :md="4">
                <el-card shadow="hover" class="stat-card">
                  <div class="num" v-text="hosts.length"></div>
                  <div class="lab">已配置主机</div>
                </el-card>
              </el-col>
              <el-col :xs="24" :sm="8" :md="4">
                <el-card shadow="hover" class="stat-card">
                  <div class="num" v-text="tasks.length"></div>
                  <div class="lab">历史任务数</div>
                </el-card>
              </el-col>
              <el-col :xs="24" :sm="8" :md="4">
                <el-card shadow="hover" class="stat-card">
                  <div class="num" style="color:#e6a23c;" v-text="runningCount"></div>
                  <div class="lab">进行中</div>
                </el-card>
              </el-col>
              <el-col :xs="24" :sm="8" :md="4">
                <el-card shadow="hover" class="stat-card">
                  <div class="num" style="color:#52c41a;" v-text="successCount"></div>
                  <div class="lab">成功</div>
                </el-card>
              </el-col>
              <el-col :xs="24" :sm="8" :md="4">
                <el-card shadow="hover" class="stat-card">
                  <div class="num" style="color:#f56c6c;" v-text="failedCount"></div>
                  <div class="lab">失败</div>
                </el-card>
              </el-col>
              <el-col :xs="24" :sm="8" :md="4">
                <el-card shadow="hover" class="stat-card">
                  <div class="num" style="color:#909399;" v-text="(tasks.length ? Math.round(successCount * 100 / tasks.length) : 0) + '%'"></div>
                  <div class="lab">成功率</div>
                </el-card>
              </el-col>
            </el-row>
            <el-row :gutter="16" style="margin-bottom:20px;">
              <el-col :xs="24" :lg="14">
                <el-card shadow="never">
                  <template #header><span style="font-weight:600">平台说明</span></template>
                  <p style="margin:0 0 10px;line-height:1.7;color:#606266;">
                    本控制台用于 <strong>TPOPS / GaussDB 容器化部署</strong>：在「主机管理」登记 SSH 可达的执行机（部署根目录需含 <code>appctl.sh</code>），在「部署任务」按向导填写
                    <code>user_edit_file.conf</code> 后，系统会<strong>自动检测</strong>远程
                    <code>config/gaussdb/user_edit_file.conf</code> 或 <code>config/user_edit_file.conf</code> 是否存在并<strong>覆盖写入</strong>，再执行所选 <code>appctl.sh</code> 操作。
                  </p>
                  <el-descriptions :column="1" border size="small">
                    <el-descriptions-item label="Manifest">部署根目录下 <code>config/gaussdb/manifest.yaml</code>，任务运行中轮询解析进度树</el-descriptions-item>
                    <el-descriptions-item label="配置文件"><code>user_edit</code> 以页面填写为准原样下发；所选节点仅用于 SSH 连接与执行 appctl</el-descriptions-item>
                    <el-descriptions-item label="注意">docker-service 不建议并发执行多个 appctl；同一主机请避免并行任务。</el-descriptions-item>
                  </el-descriptions>
                </el-card>
              </el-col>
              <el-col :xs="24" :lg="10">
                <el-card shadow="never">
                  <template #header><span style="font-weight:600">快速开始</span></template>
                  <el-steps direction="vertical" :active="4" finish-status="success">
                    <el-step title="登记主机" description="SSH、部署根目录 /data/docker-service" />
                    <el-step title="选择部署形态" description="单节点或三节点形态" />
                    <el-step title="选择节点" description="节点 1 必填；三节点时 2/3 可选" />
                    <el-step title="配置与下发" description="编辑 user_edit 并选择 appctl 操作" />
                  </el-steps>
                </el-card>
              </el-col>
            </el-row>

            <el-row :gutter="16">
              <el-col :xs="24" :lg="14">
                <el-card shadow="never">
                  <template #header><span style="font-weight:600">已纳管主机</span></template>
                  <el-table v-if="hosts.length" :data="hosts" stripe size="small" max-height="280">
                    <el-table-column prop="name" label="名称" width="120" />
                    <el-table-column prop="hostname" label="IP / 域名" min-width="130" />
                    <el-table-column prop="port" label="SSH 端口" width="88" />
                    <el-table-column prop="username" label="SSH 用户" width="100" />
                    <el-table-column prop="docker_service_root" label="部署根目录" min-width="160" show-overflow-tooltip />
                  </el-table>
                  <el-empty v-else description="暂无主机，请前往「主机管理」添加" />
                </el-card>
              </el-col>
              <el-col :xs="24" :lg="10">
                <el-card shadow="never">
                  <template #header><span style="font-weight:600">最近任务</span></template>
                  <el-table v-if="lastTasks.length" :data="lastTasks" stripe size="small" max-height="280">
                    <el-table-column prop="id" label="ID" width="56" />
                    <el-table-column prop="host_name" label="节点1" min-width="90" show-overflow-tooltip />
                    <el-table-column prop="deploy_mode" label="形态" width="72" />
                    <el-table-column prop="action" label="操作" min-width="120" show-overflow-tooltip />
                    <el-table-column prop="status" label="状态" width="88" />
                  </el-table>
                  <el-empty v-else description="暂无任务记录" />
                </el-card>
              </el-col>
            </el-row>
          </template>

          <!-- 主机管理 -->
          <template v-else-if="activeMenu === 'hosts'">
            <h2 class="ob-page-title">主机管理</h2>
            <el-row :gutter="16">
              <el-col :xs="24" :lg="9">
                <el-card shadow="never">
                  <template #header><span style="font-weight:600">添加 / 编辑主机</span></template>
                  <el-form :model="hostForm" label-width="112px" size="default">
                    <el-form-item label="显示名称">
                      <el-input v-model="hostForm.name" placeholder="如：生产节点-1" />
                    </el-form-item>
                    <el-form-item label="IP / 域名">
                      <el-input v-model="hostForm.hostname" placeholder="SSH 地址" />
                    </el-form-item>
                    <el-form-item label="SSH 端口">
                      <el-input-number v-model="hostForm.port" :min="1" :max="65535" style="width:100%" />
                    </el-form-item>
                    <el-form-item label="SSH 用户">
                      <el-input v-model="hostForm.username" placeholder="如 root" />
                    </el-form-item>
                    <el-form-item label="认证方式">
                      <el-radio-group v-model="hostForm.auth_method">
                        <el-radio label="password">密码</el-radio>
                        <el-radio label="key">私钥</el-radio>
                      </el-radio-group>
                    </el-form-item>
                    <el-form-item v-if="hostForm.auth_method==='password'" label="密码">
                      <el-input v-model="hostForm.password" type="password" show-password placeholder="保存时写入" />
                    </el-form-item>
                    <el-form-item v-else label="私钥 PEM">
                      <el-input v-model="hostForm.private_key" type="textarea" :rows="5" placeholder="-----BEGIN ... KEY-----" />
                    </el-form-item>
                    <el-form-item label="部署根目录">
                      <el-input v-model="hostForm.docker_service_root" placeholder="/data/docker-service" />
                      <div class="hint">与远程 <code>appctl.sh</code> 所在目录一致（如 <code>/data/docker-service</code>）。执行：<code>cd &lt;目录&gt; && sh appctl.sh ...</code>。进度文件：<code>&lt;目录&gt;/config/gaussdb/manifest.yaml</code>。</div>
                    </el-form-item>
                    <el-form-item>
                      <el-button type="primary" @click="saveHost" :loading="loading">保存</el-button>
                      <el-button @click="resetHostForm">清空表单</el-button>
                    </el-form-item>
                  </el-form>
                </el-card>
              </el-col>
              <el-col :xs="24" :lg="15">
                <el-card shadow="never">
                  <template #header><span style="font-weight:600">主机列表</span></template>
                  <el-table :data="hosts" stripe style="width:100%">
                    <el-table-column prop="name" label="名称" min-width="100" />
                    <el-table-column prop="hostname" label="地址" min-width="120" />
                    <el-table-column prop="docker_service_root" label="部署根目录" min-width="160" show-overflow-tooltip />
                    <el-table-column label="操作" width="200" fixed="right">
                      <template #default="{ row }">
                        <el-button link type="primary" @click="editHost(row)">编辑</el-button>
                        <el-button link @click="testHost(row)" :loading="row._testing">连通性</el-button>
                      </template>
                    </el-table-column>
                  </el-table>
                </el-card>
              </el-col>
            </el-row>
          </template>

          <!-- 部署任务 -->
          <template v-else-if="activeMenu === 'deploy'">
            <h2 class="ob-page-title">部署任务</h2>
            <el-card shadow="never" style="margin-bottom:16px;">
              <template #header><span style="font-weight:600">新建部署向导</span></template>
              <el-steps :active="deployStep" align-center style="margin-bottom:20px;">
                <el-step title="部署形态" />
                <el-step title="选择节点" />
                <el-step title="配置与下发" />
              </el-steps>

              <div v-show="deployStep === 0">
                <el-radio-group v-model="deployForm.deploy_mode" size="large">
                  <el-radio-button label="single">单节点部署</el-radio-button>
                  <el-radio-button label="triple">三节点部署</el-radio-button>
                </el-radio-group>
                <div class="hint" style="margin-top:12px;"><strong>节点 1</strong>为执行 SSH、写配置与跑 appctl 的机器。三节点形态下可选填节点 2/3（用于后续扩展或记录）；<code>user_edit</code> 里的 IP 请自行填写，系统不会改写。</div>
                <div style="margin-top:16px;">
                  <el-button type="primary" @click="deployStep = 1">下一步</el-button>
                </div>
              </div>

              <div v-show="deployStep === 1">
                <el-form label-width="120px" style="max-width:720px;">
                  <el-form-item label="节点 1（执行）">
                    <el-select v-model="deployForm.host" placeholder="选择主机" filterable style="width:100%">
                      <el-option v-for="h in hosts" :key="h.id" :disabled="isHostDisabledForNode1(h.id)" :label="h.name + ' — ' + h.hostname + ' :' + h.port + ' (' + h.username + ')'" :value="h.id" />
                    </el-select>
                  </el-form-item>
                  <template v-if="deployForm.deploy_mode === 'triple'">
                    <el-form-item label="节点 2（可选）">
                      <el-select v-model="deployForm.host_node2" clearable placeholder="不选则与节点 1 同机" filterable style="width:100%">
                        <el-option v-for="h in hosts" :key="h.id" :disabled="isHostDisabledTriple(h.id, 2)" :label="h.name + ' — ' + h.hostname + ' :' + h.port" :value="h.id" />
                      </el-select>
                    </el-form-item>
                    <el-form-item label="节点 3（可选）">
                      <el-select v-model="deployForm.host_node3" clearable placeholder="不选则与节点 1 同机" filterable style="width:100%">
                        <el-option v-for="h in hosts" :key="h.id" :disabled="isHostDisabledTriple(h.id, 3)" :label="h.name + ' — ' + h.hostname + ' :' + h.port" :value="h.id" />
                      </el-select>
                    </el-form-item>
                  </template>
                </el-form>
                <el-button @click="deployStep = 0">上一步</el-button>
                <el-button type="primary" @click="goDeployStep2">下一步</el-button>
              </div>

              <div v-show="deployStep === 2">
                <el-alert type="info" :closable="false" show-icon style="margin-bottom:14px;">
                  <template #title>先选择要下发的操作，再点蓝色按钮；<code>user_edit</code> 在下方编辑（默认可直接改）。</template>
                </el-alert>
                <el-divider content-position="left"><span style="font-weight:600;color:#303133;">下发操作</span></el-divider>
                <el-form label-width="120px" style="max-width:720px;">
                  <el-form-item label="操作类型">
                    <el-radio-group v-model="deployForm.action" class="deploy-action-rg">
                      <el-radio-button label="precheck_install">① 安装前置检查 — <code>sh appctl.sh precheck install</code>（目标参数必填组件）</el-radio-button>
                      <el-radio-button label="precheck_upgrade">② 升级前置检查 — <code>sh appctl.sh precheck upgrade</code>（目标参数必填组件）</el-radio-button>
                      <el-radio-button label="install">③ 安装操作 — <code>sh appctl.sh install</code></el-radio-button>
                      <el-radio-button label="upgrade">④ 升级操作 — <code>sh appctl.sh upgrade</code></el-radio-button>
                    </el-radio-group>
                  </el-form-item>
                  <el-form-item label="目标参数">
                    <el-input v-model="deployForm.target" placeholder="precheck install / precheck upgrade 必填组件（如 gaussdb）；install / upgrade 按现场脚本可填或留空" />
                  </el-form-item>
                </el-form>
                <div style="margin:0 0 16px;display:flex;flex-wrap:wrap;gap:10px;">
                  <el-button type="primary" size="large" @click="startDeploy" :loading="loading">写入配置并执行</el-button>
                  <el-button size="large" @click="deployStep = 1">上一步</el-button>
                </div>
                <el-divider content-position="left"><span style="font-weight:600;color:#303133;">user_edit 配置</span></el-divider>
                <p style="margin:0 0 8px;color:#606266;font-size:13px;">默认已填入模板；<strong>node_ip 等以您填写为准</strong>，系统不会用所选 SSH 主机地址覆盖。内容将原样写入远程 <code>user_edit_file.conf</code> 后执行上方操作。</p>
                <el-input v-model="deployForm.user_edit_content" type="textarea" :rows="14" placeholder="[user_edit] ..." class="mono-ta" />
                <div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
                  <el-button @click="fillUserEditTemplate">恢复默认模板</el-button>
                  <span class="hint" style="margin:0;">底部改完配置后，点上方「写入配置并执行」即可下发。</span>
                </div>
              </div>
            </el-card>

            <el-card shadow="never" style="margin-bottom:12px;">
              <template #header>
                <span style="font-weight:600">部署进度</span>
                <span class="hint" style="margin-left:10px;">下方每一层为一行「圆点链」表示该层各服务；<strong>点击圆点</strong>在底部打开 <code>deploy/install.log</code> 或 <code>deploy/precheck.log</code> 实时 tail（install/upgrade 阶段默认 install.log）</span>
              </template>
              <div class="phase-strip">
                <span><strong>阶段</strong>：</span>
                <el-tag size="small" :type="flowS1 === 'done' ? 'success' : (flowS1 === 'active' ? 'warning' : 'info')">① appctl</el-tag>
                <el-tag size="small" @click="openLogTail('precheck')" style="cursor:pointer" title="打开 precheck.log">② 前置日志</el-tag>
                <el-tag size="small" :type="flowS3 === 'done' ? 'success' : (flowS3 === 'active' ? 'warning' : 'info')">③ manifest</el-tag>
                <el-tag size="small" @click="openLogTail('install')" style="cursor:pointer" title="打开 install.log">④ 安装日志</el-tag>
                <span style="margin-left:8px;" v-text="phaseBanner"></span>
              </div>
              <el-card v-if="manifestSummary && manifestSummary.services_total != null" shadow="hover" style="margin-bottom:14px;">
                <template #header><span style="font-weight:600">整体汇总</span></template>
                <el-row :gutter="8">
                  <el-col :xs="8"><span style="font-size:12px;color:#909399;">层完成</span><div style="font-size:18px;font-weight:600;color:#1890ff;"><span v-text="manifestSummary.levels_done || 0"></span>/<span v-text="manifestSummary.levels_total || 8"></span></div></el-col>
                  <el-col :xs="8"><span style="font-size:12px;color:#909399;">服务 done</span><div style="font-size:18px;font-weight:600;color:#52c41a;"><span v-text="manifestSummary.services_done || 0"></span>/<span v-text="manifestSummary.services_total || 0"></span></div></el-col>
                  <el-col :xs="8"><span style="font-size:12px;color:#909399;">manifest 文件</span><div style="font-size:11px;color:#606266;word-break:break-all;" v-text="(manifestPaths || []).join(' · ') || '—'"></div></el-col>
                </el-row>
              </el-card>
              <div v-if="manifestServiceRows.length && showManifestTree">
                <div v-for="(row, ri) in manifestServiceRows" :key="row.id" class="manifest-level-block">
                  <div class="manifest-level-title">
                    <span v-text="row.label"></span>
                    <el-tag size="small" :type="row.status === 'done' ? 'success' : (row.status === 'error' ? 'danger' : (row.status === 'running' ? 'warning' : 'info'))" v-text="row.status || 'none'"></el-tag>
                  </div>
                  <div class="svc-pipeline">
                    <div v-for="(svc, si) in row.services" :key="svc.id" style="display:flex;align-items:flex-start;">
                      <div v-if="si > 0" class="svc-connector" :class="{ done: prevSvcDone(row.services, si) }"></div>
                      <div class="svc-step-wrap">
                        <div style="display:flex;flex-direction:column;align-items:center;">
                          <div
                            class="svc-dot"
                            :class="svcDotClass(svc.status)"
                            :title="'点击 tail 日志 · ' + svc.label"
                            @click="onManifestServiceClick(svc, row)"
                            v-text="(si + 1)"
                          ></div>
                          <div class="svc-cap" v-text="shortSvcLabel(svc.label)"></div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <el-empty v-else :description="showManifestTree ? '等待 manifest 数据…' : '当前为前置检查：不展示 manifest 服务流；可用上方标签打开 precheck.log'" />
            </el-card>

            <div class="log-stack">
              <el-card shadow="never">
                <template #header><span style="font-weight:600">appctl 标准输出</span></template>
                <div class="log-box log-box-tall" v-text="logText"></div>
              </el-card>
              <el-card shadow="never">
                <template #header><span style="font-weight:600">文件日志（tail）</span> <span class="hint" v-text="logTailLabel"></span></template>
                <div class="log-box log-box-tall" v-text="logTailText"></div>
              </el-card>
              <div style="font-size:13px;color:#606266;">
                任务状态：<span v-text="taskStatus || '-'"></span>
                <span v-if="currentTaskId"> · #<span v-text="currentTaskId"></span></span>
              </div>
            </div>

            <el-card shadow="never" style="margin-top:16px;">
              <template #header><span style="font-weight:600">任务历史</span></template>
              <el-table :data="tasks" stripe>
                <el-table-column prop="id" label="ID" width="72" />
                <el-table-column prop="host_name" label="节点1" min-width="100" />
                <el-table-column prop="deploy_mode" label="形态" width="80" />
                <el-table-column prop="action" label="操作" min-width="160" show-overflow-tooltip />
                <el-table-column prop="target" label="目标" width="100" />
                <el-table-column prop="status" label="状态" width="110" />
                <el-table-column prop="exit_code" label="退出码" width="88" />
                <el-table-column label="订阅日志" width="100" fixed="right">
                  <template #default="{ row }">
                    <el-button link type="primary" @click="attachTask(row)">订阅</el-button>
                  </template>
                </el-table-column>
              </el-table>
            </el-card>
          </template>
        </el-main>
      </el-container>
    </el-container>

    <el-dialog v-model="showRegister" title="注册账号" width="440px">
      <el-form :model="regForm" label-width="88px">
        <el-form-item label="用户名"><el-input v-model="regForm.username" /></el-form-item>
        <el-form-item label="邮箱"><el-input v-model="regForm.email" /></el-form-item>
        <el-form-item label="密码"><el-input v-model="regForm.password" type="password" /></el-form-item>
        <el-form-item label="确认密码"><el-input v-model="regForm.password_confirm" type="password" /></el-form-item>
        <el-form-item label="角色">
          <el-select v-model="regForm.role" style="width:100%">
            <el-option label="只读" value="viewer" />
            <el-option label="操作员" value="operator" />
            <el-option label="管理员" value="admin" />
          </el-select>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="showRegister=false">取消</el-button>
        <el-button type="primary" @click="doRegister" :loading="loading">注册</el-button>
      </template>
    </el-dialog>
  </div>

  <script src="https://unpkg.com/vue@3.3.11/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus@2.4.4/dist/index.full.min.js"></script>
  <script src="https://unpkg.com/axios@1.6.5/dist/axios.min.js"></script>
  <script>
    const { createApp, ref, reactive, computed, watch, onMounted, onUnmounted } = Vue;
    const api = axios.create({ baseURL: '/api' });
    createApp({
      setup() {
        const token = ref(localStorage.getItem('access') || '');
        const refresh = ref(localStorage.getItem('refresh') || '');
        const user = ref(JSON.parse(localStorage.getItem('user') || '{}'));
        const loading = ref(false);
        const activeMenu = ref('overview');
        const hosts = ref([]);
        const tasks = ref([]);
        const showRegister = ref(false);
        const loginForm = reactive({ username: '', password: '' });
        const regForm = reactive({ username: '', email: '', password: '', password_confirm: '', role: 'viewer' });
        const hostForm = reactive({ id: null, name: '', hostname: '', port: 22, username: 'root', auth_method: 'password', password: '', private_key: '', docker_service_root: '/data/docker-service' });

        const USER_EDIT_TEMPLATE = `[user_edit]
ssh_port = 22
gauss_path = /data/gaussdb
node1_ip = 192.168.0.1
node2_ip = 192.168.0.2
node3_ip = 192.168.0.3
influxdb_install_ip1 = 192.168.0.1
influxdb_install_ip2 = 192.168.0.2
sftp_install_ip1 = 192.168.0.1
sftp_install_ip2 = 192.168.0.2
main_path = /data/cloud
node1_ip2 = 192.168.0.1
node2_ip2 = 192.168.0.2
node3_ip2 = 192.168.0.3
log_path = /data/cloud/logs
sftp_path = /data/sftphome
influx_path = /data/influxdb
docker_path = /data/docker
use_cgroup = no
ntp_server =
cpu_limit =
mem_limit =
es_enable = no
es_path = /data/elasticsearch
ipv6_enable = no
use_import_ca = no
`;

        const deployForm = reactive({
          deploy_mode: 'single',
          host: null,
          host_node2: null,
          host_node3: null,
          user_edit_content: USER_EDIT_TEMPLATE,
          action: 'precheck_install',
          target: 'gaussdb',
        });
        const logText = ref('');
        const logTailText = ref('');
        const logTailLabel = ref('（点击流程 ② / ④）');
        const treeRoots = ref([]);
        const manifestSummary = ref(null);
        const manifestPaths = ref([]);
        const taskStatus = ref('');
        const currentTaskId = ref(null);
        const lastAction = ref('');
        const phaseHint = ref('');
        const phaseBanner = ref('');
        const flowS1 = ref('pending');
        const flowS2 = ref('pending');
        const flowS3 = ref('pending'); // manifest 轮询
        const flowS4 = ref('pending'); // install.log
        let socket = null;
        let logSocket = null;

        const showManifestTree = computed(() => {
          const a = lastAction.value || '';
          return a === 'install' || a === 'upgrade';
        });

        const manifestServiceRows = computed(() => {
          const roots = treeRoots.value || [];
          return roots
            .filter((r) => r && r.children && r.children.length)
            .map((r) => ({
              id: r.id,
              label: r.label,
              status: r.status || 'none',
              services: (r.children || []).map((c) => ({
                id: c.id,
                label: c.label || '',
                status: c.status || 'none',
                meta: c.meta || {},
              })),
            }));
        });

        const breadcrumbTitle = computed(() => {
          const m = { overview: '概览', hosts: '主机管理', deploy: '部署任务' };
          return m[activeMenu.value] || '';
        });

        const runningCount = computed(() => tasks.value.filter(t => t.status === 'running').length);
        const successCount = computed(() => tasks.value.filter(t => t.status === 'success').length);
        const failedCount = computed(() => tasks.value.filter(t => t.status === 'failed').length);
        const lastTasks = computed(() => tasks.value.slice(0, 8));

        const deployStep = ref(0);

        const onMenuSelect = (key) => { activeMenu.value = key; };

        const isHostDisabledForNode1 = (hid) => {
          if (deployForm.deploy_mode !== 'triple') return false;
          return hid === deployForm.host_node2 || hid === deployForm.host_node3;
        };
        const isHostDisabledTriple = (hid, slot) => {
          if (deployForm.deploy_mode !== 'triple') return false;
          if (hid === deployForm.host) return true;
          if (slot === 2) return hid === deployForm.host_node3;
          if (slot === 3) return hid === deployForm.host_node2;
          return false;
        };

        const goDeployStep2 = () => {
          if (!deployForm.host) return ElementPlus.ElMessage.warning('请选择节点 1（执行机）');
          if (deployForm.deploy_mode === 'triple') {
            const ids = [deployForm.host, deployForm.host_node2, deployForm.host_node3].filter(Boolean);
            if (new Set(ids).size !== ids.length)
              return ElementPlus.ElMessage.warning('所选主机不能重复');
          }
          if (!(deployForm.user_edit_content || '').trim()) {
            deployForm.user_edit_content = USER_EDIT_TEMPLATE;
          }
          deployStep.value = 2;
        };

        const fillUserEditTemplate = () => {
          deployForm.user_edit_content = USER_EDIT_TEMPLATE;
          ElementPlus.ElMessage.success('已恢复为默认模板');
        };

        watch(() => deployForm.deploy_mode, (v) => {
          if (v === 'single') {
            deployForm.host_node2 = null;
            deployForm.host_node3 = null;
          }
        });

        const setAuth = (access, refToken, u) => {
          token.value = access || '';
          refresh.value = refToken || '';
          if (access) localStorage.setItem('access', access); else localStorage.removeItem('access');
          if (refToken) localStorage.setItem('refresh', refToken); else localStorage.removeItem('refresh');
          if (u) { user.value = u; localStorage.setItem('user', JSON.stringify(u)); }
        };

        api.interceptors.request.use(cfg => {
          if (token.value) cfg.headers.Authorization = 'Bearer ' + token.value;
          return cfg;
        });

        api.interceptors.response.use(r => r, async err => {
          const orig = err.config;
          if (err.response && err.response.status === 401 && refresh.value && !orig._retry) {
            orig._retry = true;
            try {
              const { data } = await axios.post('/api/auth/token/refresh/', { refresh: refresh.value });
              setAuth(data.access, refresh.value, user.value);
              orig.headers.Authorization = 'Bearer ' + token.value;
              return api(orig);
            } catch (e) {
              setAuth('', '', null);
            }
          }
          return Promise.reject(err);
        });

        const fetchHosts = async () => {
          const { data } = await api.get('/hosts/');
          hosts.value = data;
        };
        const fetchTasks = async () => {
          const { data } = await api.get('/deployment/tasks/');
          tasks.value = data;
        };

        const resetFlow = () => {
          flowS1.value = 'pending';
          flowS2.value = 'pending';
          flowS3.value = 'pending';
          flowS4.value = 'pending';
          phaseHint.value = '';
          phaseBanner.value = '';
          manifestPaths.value = [];
        };

        const closeSocket = () => {
          if (socket) { socket.close(); socket = null; }
        };
        const closeLogSocket = () => {
          if (logSocket) { logSocket.close(); logSocket = null; }
        };

        const openLogTail = (kind) => {
          if (!currentTaskId.value) return ElementPlus.ElMessage.warning('请先创建或订阅任务');
          closeLogSocket();
          logTailText.value = '';
          logTailLabel.value = kind === 'install' ? 'install.log' : 'precheck.log';
          const proto = location.protocol === 'https:' ? 'wss' : 'ws';
          const url = `${proto}://${location.host}/ws/deploy/${currentTaskId.value}/log/?token=${encodeURIComponent(token.value)}&kind=${encodeURIComponent(kind)}`;
          logSocket = new WebSocket(url);
          logSocket.onmessage = (ev) => {
            let msg;
            try { msg = JSON.parse(ev.data); } catch { return; }
            if (msg.type === 'chunk' && msg.data) logTailText.value += msg.data;
            if (msg.type === 'meta') logTailLabel.value = (msg.path || '') + ' (' + (msg.kind || '') + ')';
            if (msg.type === 'error') ElementPlus.ElMessage.error(msg.message || '日志错误');
          };
          logSocket.onerror = () => ElementPlus.ElMessage.error('日志 WebSocket 错误');
        };

        const openLogTailRel = (relFile, hint) => {
          if (!currentTaskId.value) return ElementPlus.ElMessage.warning('请先创建或订阅任务');
          closeLogSocket();
          logTailText.value = '';
          logTailLabel.value = hint || relFile;
          const proto = location.protocol === 'https:' ? 'wss' : 'ws';
          const url = `${proto}://${location.host}/ws/deploy/${currentTaskId.value}/log/?token=${encodeURIComponent(token.value)}&rel=${encodeURIComponent(relFile)}`;
          logSocket = new WebSocket(url);
          logSocket.onmessage = (ev) => {
            let msg;
            try { msg = JSON.parse(ev.data); } catch { return; }
            if (msg.type === 'chunk' && msg.data) logTailText.value += msg.data;
            if (msg.type === 'meta') logTailLabel.value = (msg.path || '') + (hint ? ' · ' + hint : '');
            if (msg.type === 'error') ElementPlus.ElMessage.error(msg.message || '日志错误');
          };
          logSocket.onerror = () => ElementPlus.ElMessage.error('日志 WebSocket 错误');
        };

        const svcDotClass = (st) => {
          const s = (st || 'none').toLowerCase();
          if (s === 'done') return 'done';
          if (s === 'running' || s === 'retrying') return 'active';
          if (s === 'error' || s === 'null') return 'error';
          return 'pending';
        };

        const shortSvcLabel = (lab) => {
          const s = (lab || '').replace(/ · .*$/, '');
          return s.length > 18 ? s.slice(0, 16) + '…' : s;
        };

        const prevSvcDone = (services, idx) => {
          if (idx <= 0 || !services || !services[idx - 1]) return false;
          return (services[idx - 1].status || '').toLowerCase() === 'done';
        };

        const onManifestServiceClick = (svc, row) => {
          const a = lastAction.value || '';
          const rel = a.startsWith('precheck') ? 'precheck.log' : 'install.log';
          const hint = (row.label || '') + ' / ' + (svc.label || svc.id || '');
          openLogTailRel(rel, hint);
          ElementPlus.ElMessage.info('正在 tail: ' + rel + '（若现场按服务拆分日志，可将文件名规则告知以精确打开）');
        };

        const openSocket = (taskId) => {
          closeSocket();
          closeLogSocket();
          resetFlow();
          logTailText.value = '';
          const proto = location.protocol === 'https:' ? 'wss' : 'ws';
          const url = `${proto}://${location.host}/ws/deploy/${taskId}/?token=${encodeURIComponent(token.value)}`;
          socket = new WebSocket(url);
          socket.onmessage = (ev) => {
            let msg;
            try { msg = JSON.parse(ev.data); } catch { return; }
            if (msg.type === 'hello') {
              taskStatus.value = msg.status;
              if (msg.action) lastAction.value = msg.action;
            }
            if (msg.type === 'phase') {
              phaseBanner.value = msg.message || '';
              phaseHint.value = (msg.paths_tried && msg.paths_tried.length) ? ('检测: ' + msg.paths_tried.join(', ')) : (msg.command || '');
              if (msg.phase === 'run_appctl') { flowS1.value = 'active'; }
              if (msg.phase === 'manifest_poll') {
                flowS1.value = 'active';
                flowS3.value = 'active';
              }
              if (msg.phase === 'precheck_no_manifest') {
                flowS3.value = 'skip';
                flowS4.value = 'skip';
              }
            }
            if (msg.type === 'log' && msg.data) logText.value += msg.data;
            if (msg.type === 'manifest' && msg.data) {
              if (msg.data.roots) treeRoots.value = msg.data.roots;
              manifestSummary.value = msg.data.summary || null;
              if (msg.data.manifest_paths) manifestPaths.value = msg.data.manifest_paths;
              flowS3.value = 'active';
              flowS4.value = 'active';
            }
            if (msg.type === 'manifest_wait') {
              phaseHint.value = (msg.message || '') + (msg.paths ? ' — ' + msg.paths.join(', ') : '');
            }
            if (msg.type === 'status') {
              taskStatus.value = msg.data;
              if (msg.data === 'running') flowS1.value = 'active';
            }
            if (msg.type === 'done') {
              taskStatus.value = 'finished:' + msg.exit_code;
              flowS1.value = 'done';
              const a = lastAction.value || '';
              if (a === 'precheck_install' || a === 'precheck_upgrade') {
                flowS2.value = 'done';
                flowS3.value = 'skip';
                flowS4.value = 'skip';
              } else {
                flowS2.value = 'done';
                flowS3.value = flowS3.value === 'skip' ? 'skip' : 'done';
                flowS4.value = 'done';
              }
            }
          };
          socket.onerror = () => ElementPlus.ElMessage.error('WebSocket 错误');
        };

        const doLogin = async () => {
          loading.value = true;
          try {
            const { data } = await api.post('/auth/login/', loginForm);
            setAuth(data.token.access, data.token.refresh, data.user);
            ElementPlus.ElMessage.success('登录成功');
            activeMenu.value = 'overview';
            await fetchHosts();
            await fetchTasks();
          } catch (e) {
            ElementPlus.ElMessage.error(e.response?.data?.detail || '登录失败');
          } finally { loading.value = false; }
        };

        const doRegister = async () => {
          loading.value = true;
          try {
            await api.post('/auth/register/', regForm);
            ElementPlus.ElMessage.success('注册成功，请登录');
            showRegister.value = false;
          } catch (e) {
            ElementPlus.ElMessage.error('注册失败');
          } finally { loading.value = false; }
        };

        const logout = () => {
          closeSocket();
          closeLogSocket();
          setAuth('', '', null);
          localStorage.removeItem('user');
          logText.value = '';
          logTailText.value = '';
          treeRoots.value = [];
          manifestSummary.value = null;
          manifestPaths.value = [];
        };

        const resetHostForm = () => {
          Object.assign(hostForm, { id: null, name: '', hostname: '', port: 22, username: 'root', auth_method: 'password', password: '', private_key: '', docker_service_root: '/data/docker-service' });
        };

        const saveHost = async () => {
          loading.value = true;
          try {
            if (hostForm.id) {
              await api.patch('/hosts/' + hostForm.id + '/', hostForm);
            } else {
              await api.post('/hosts/', hostForm);
            }
            ElementPlus.ElMessage.success('已保存');
            resetHostForm();
            await fetchHosts();
          } catch (e) {
            ElementPlus.ElMessage.error('保存失败');
          } finally { loading.value = false; }
        };

        const editHost = (row) => {
          Object.assign(hostForm, { ...row, password: '', private_key: '' });
        };

        const testHost = async (row) => {
          row._testing = true;
          try {
            const { data } = await api.post('/hosts/' + row.id + '/test_connection/');
            if (data.ok) ElementPlus.ElMessage.success(data.message);
            else ElementPlus.ElMessage.error(data.message);
          } finally { row._testing = false; }
        };

        const startDeploy = async () => {
          if (!deployForm.host) return ElementPlus.ElMessage.warning('请选择节点 1');
          if (!(deployForm.user_edit_content || '').trim())
            return ElementPlus.ElMessage.warning('请填写或保留默认 user_edit 配置');
          if (deployForm.deploy_mode === 'triple') {
            const ids = [deployForm.host, deployForm.host_node2, deployForm.host_node3].filter(Boolean);
            if (new Set(ids).size !== ids.length)
              return ElementPlus.ElMessage.warning('所选主机不能重复');
          }
          loading.value = true;
          logText.value = '';
          logTailText.value = '';
          treeRoots.value = [];
          manifestSummary.value = null;
          manifestPaths.value = [];
          lastAction.value = deployForm.action;
          try {
            const body = {
              host: deployForm.host,
              deploy_mode: deployForm.deploy_mode,
              user_edit_content: deployForm.user_edit_content,
              action: deployForm.action,
              target: deployForm.target,
            };
            if (deployForm.deploy_mode === 'triple') {
              body.host_node2 = deployForm.host_node2;
              body.host_node3 = deployForm.host_node3;
            }
            const { data } = await api.post('/deployment/tasks/', body);
            currentTaskId.value = data.id;
            taskStatus.value = data.status;
            openSocket(data.id);
            await fetchTasks();
            ElementPlus.ElMessage.success('任务已创建');
            deployStep.value = 0;
            deployForm.host_node2 = null;
            deployForm.host_node3 = null;
          } catch (e) {
            const msg = e.response?.data;
            const t = typeof msg === 'object' ? JSON.stringify(msg) : (msg || '创建任务失败');
            ElementPlus.ElMessage.error(t);
          } finally { loading.value = false; }
        };

        const attachTask = (row) => {
          currentTaskId.value = row.id;
          taskStatus.value = row.status;
          lastAction.value = row.action || '';
          logText.value = '';
          logTailText.value = '';
          treeRoots.value = [];
          manifestSummary.value = null;
          manifestPaths.value = [];
          activeMenu.value = 'deploy';
          openSocket(row.id);
        };

        onMounted(async () => {
          if (token.value) {
            try { await fetchHosts(); await fetchTasks(); } catch {}
          }
        });
        onUnmounted(() => { closeSocket(); closeLogSocket(); });

        return {
          token, user, loading, activeMenu, breadcrumbTitle, runningCount, successCount, failedCount, lastTasks, onMenuSelect,
          hosts, tasks, showRegister, loginForm, regForm, hostForm, deployForm, deployStep,
          logText, logTailText, logTailLabel, treeRoots, manifestSummary, manifestPaths, taskStatus, currentTaskId,
          showManifestTree, manifestServiceRows, phaseHint, phaseBanner, flowS1, flowS2, flowS3, flowS4,
          openLogTail, openLogTailRel, svcDotClass, shortSvcLabel, prevSvcDone, onManifestServiceClick,
          isHostDisabledForNode1, isHostDisabledTriple, goDeployStep2, fillUserEditTemplate,
          doLogin, doRegister, logout, saveHost, resetHostForm, editHost, testHost, startDeploy, attachTask,
        };
      }
    }).use(ElementPlus).mount('#app');
  </script>
</body>
</html>
