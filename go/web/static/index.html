<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TPOPS 部署</title>
  <style>
    :root { --bg:#f0f2f5; --card:#fff; --b:#e2e8f0; --txt:#1e293b; --muted:#64748b; --blue:#0062ff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: "PingFang SC","Microsoft YaHei",system-ui,sans-serif; background:var(--bg); color:var(--txt); min-height:100vh; }
    header { background:var(--card); border-bottom:1px solid var(--b); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; }
    header h1 { margin:0; font-size:18px; font-weight:700; }
    main { max-width:720px; margin:24px auto; padding:0 16px; }
    .card { background:var(--card); border:1px solid var(--b); border-radius:12px; padding:20px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
    label { display:block; font-size:13px; font-weight:600; color:var(--muted); margin-bottom:6px; }
    input { width:100%; padding:10px 12px; border:1px solid var(--b); border-radius:8px; margin-bottom:14px; font-size:14px; }
    button { background:var(--blue); color:#fff; border:none; padding:10px 18px; border-radius:8px; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .hint { font-size:12px; color:var(--muted); margin-top:12px; line-height:1.5; }
    pre { background:#0f172a; color:#e2e8f0; padding:12px; border-radius:8px; overflow:auto; font-size:12px; max-height:40vh; }
    .ok { color:#16a34a; font-size:13px; margin-top:8px; }
    .err { color:#dc2626; font-size:13px; margin-top:8px; }
  </style>
</head>
<body>
  <header>
    <h1>TPOPS 部署控制台</h1>
    <span id="who" style="font-size:13px;color:var(--muted);">未登录</span>
  </header>
  <main>
    <div class="card" id="loginCard">
      <h2 style="margin:0 0 16px;font-size:16px;">登录</h2>
      <label>用户名</label>
      <input id="user" type="text" autocomplete="username" />
      <label>密码</label>
      <input id="pass" type="password" autocomplete="current-password" />
      <button id="btn" type="button">登录</button>
      <p class="hint">接口前缀为当前站点 <code>/api</code>；本页与后端同域单端口部署。</p>
      <p id="msg" class="err" style="display:none;"></p>
    </div>
    <div class="card" id="dashCard" style="display:none;margin-top:16px;">
      <h2 style="margin:0 0 12px;font-size:16px;">会话</h2>
      <p class="ok" id="ok"></p>
      <p style="font-size:13px;color:var(--muted);margin:8px 0;">GET /api/deployment/tasks/ 示例：</p>
      <pre id="out">{}</pre>
      <button type="button" id="logout" style="margin-top:12px;background:#64748b;">退出（清除本地 token）</button>
    </div>
  </main>
  <script>
    (function () {
      var api = '';
      function token() { return localStorage.getItem('tpops_access') || ''; }
      function setWho() {
        var t = token();
        document.getElementById('who').textContent = t ? '已登录' : '未登录';
        document.getElementById('loginCard').style.display = t ? 'none' : 'block';
        document.getElementById('dashCard').style.display = t ? 'block' : 'none';
        if (t) loadTasks();
      }
      function showErr(m) {
        var el = document.getElementById('msg');
        el.style.display = m ? 'block' : 'none';
        el.textContent = m || '';
      }
      async function loadTasks() {
        var r = await fetch(api + '/api/deployment/tasks/', { headers: { 'Authorization': 'Bearer ' + token() } });
        var j = await r.json().catch(function(){ return {}; });
        document.getElementById('out').textContent = JSON.stringify(j, null, 2);
      }
      document.getElementById('btn').onclick = async function () {
        var u = document.getElementById('user').value.trim();
        var p = document.getElementById('pass').value;
        showErr('');
        document.getElementById('btn').disabled = true;
        try {
          var r = await fetch(api + '/api/auth/login/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: u, password: p })
          });
          var data = await r.json();
          if (!r.ok) throw new Error(data.detail || JSON.stringify(data));
          localStorage.setItem('tpops_access', data.token.access);
          if (data.token.refresh) localStorage.setItem('tpops_refresh', data.token.refresh);
          document.getElementById('ok').textContent = '欢迎，' + (data.user && data.user.username || u);
          setWho();
        } catch (e) {
          showErr(e.message || '登录失败');
        } finally {
          document.getElementById('btn').disabled = false;
        }
      };
      document.getElementById('logout').onclick = function () {
        localStorage.removeItem('tpops_access');
        localStorage.removeItem('tpops_refresh');
        setWho();
      };
      setWho();
    })();
  </script>
</body>
</html>
